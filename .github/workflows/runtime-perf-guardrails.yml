name: runtime-perf-guardrails

on:
  pull_request:
    paths:
      - 'clients/go/node/**'
      - 'clients/rust/crates/rubin-node/**'
      - 'scripts/runtime_perf/**'
      - '.github/workflows/runtime-perf-guardrails.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-perf:
    name: runtime-perf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25.9'
          cache: true
          cache-dependency-path: |
            clients/go/go.mod

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache OpenSSL 3.5 bundle
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/rubin-openssl/bundle-3.5.5
            ~/.cache/rubin-openssl/work/openssl-3.5.5.tar.gz
          key: openssl-bundle-${{ runner.os }}-3.5.5-v2

      - name: Build OpenSSL 3.5.5 bundle
        id: openssl
        run: |
          set -euo pipefail
          PREFIX="$HOME/.cache/rubin-openssl/bundle-3.5.5"
          MODULES_DIR="$PREFIX/lib/ossl-modules"
          if [ ! -d "$MODULES_DIR" ] && [ -d "$PREFIX/lib64/ossl-modules" ]; then
            MODULES_DIR="$PREFIX/lib64/ossl-modules"
          fi
          if [ ! -x "$PREFIX/bin/openssl" ] || [ ! -f "$PREFIX/ssl/openssl-fips.cnf" ] || [ ! -d "$MODULES_DIR" ]; then
            OPENSSL_VERSION=3.5.5 PREFIX="$PREFIX" bash scripts/crypto/openssl/build-openssl-bundle.sh
          fi
          if [ -d "$PREFIX/lib/ossl-modules" ]; then
            MODULES_DIR="$PREFIX/lib/ossl-modules"
          elif [ -d "$PREFIX/lib64/ossl-modules" ]; then
            MODULES_DIR="$PREFIX/lib64/ossl-modules"
          else
            echo "ERROR: OpenSSL modules directory not found under $PREFIX/lib*/ossl-modules" >&2
            exit 1
          fi
          {
            echo "$PREFIX/bin"
          } >> "$GITHUB_PATH"
          {
            echo "OPENSSL_DIR=$PREFIX"
            echo "PKG_CONFIG_PATH=$PREFIX/lib64/pkgconfig:$PREFIX/lib/pkgconfig"
            echo "LD_LIBRARY_PATH=$PREFIX/lib64:$PREFIX/lib"
            echo "OPENSSL_MODULES=$MODULES_DIR"
            echo "OPENSSL_CONF=$PREFIX/ssl/openssl-fips.cnf"
          } >> "$GITHUB_ENV"

      - name: Verify OpenSSL PQ algorithms
        run: |
          openssl version
          openssl list -signature-algorithms | grep -E 'ML-DSA-87'

      - name: Prepare base worktree
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          set -euo pipefail
          git worktree add "$RUNNER_TEMP/runtime-perf-base" "${{ github.event.pull_request.base.sha }}"

      - name: Run base runtime perf suite
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          set +e
          mkdir -p artifacts/runtime-perf/base
          scripts/runtime_perf/run_runtime_perf_suite.sh \
            --repo-root "$RUNNER_TEMP/runtime-perf-base" \
            --output-dir "$PWD/artifacts/runtime-perf/base"
          echo "$?" > artifacts/runtime-perf/base/exit_code.txt
          exit 0

      - name: Run head runtime perf suite
        run: |
          set +e
          mkdir -p artifacts/runtime-perf/head
          scripts/runtime_perf/run_runtime_perf_suite.sh \
            --repo-root "$PWD" \
            --output-dir "$PWD/artifacts/runtime-perf/head"
          echo "$?" > artifacts/runtime-perf/head/exit_code.txt
          exit 0

      - name: Compare base vs head runtime perf
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          python3 scripts/runtime_perf/compare_runtime_perf.py \
            --base-dir artifacts/runtime-perf/base \
            --head-dir artifacts/runtime-perf/head \
            --summary artifacts/runtime-perf/summary.md \
            --output artifacts/runtime-perf/delta.json
          cat artifacts/runtime-perf/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Head-only runtime perf summary
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          {
            echo "# Runtime Perf Guardrails"
            echo
            echo "Head-only run (no PR base available)."
            echo
            echo "Artifacts:"
            echo "- \`artifacts/runtime-perf/head/go_metrics.json\`"
            echo "- \`artifacts/runtime-perf/head/rust_metrics.json\`"
          } > artifacts/runtime-perf/summary.md
          cat artifacts/runtime-perf/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload runtime perf artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: runtime-perf-guardrails
          path: artifacts/runtime-perf
