# Kani bounded model checking for Rust consensus library.
#
# Runs all #[kani::proof] harnesses in clients/rust/crates/rubin-consensus.
# Kani verifies properties for ALL possible inputs within the specified bound,
# providing mathematical guarantees that complement Lean4 formal proofs.
#
# SAT-intractable harnesses are excluded:
#   - SHA3 (Keccak-f[1600] 24-round permutation)
#   - BigUint (arbitrary-precision arithmetic via Vec<u32>)
# Remaining harnesses (compactsize, subsidy, merkle-empty, tx-header, block-weight)
# solve in seconds on GitHub Actions runners.
name: Kani Verification

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly: Wednesday 04:00 UTC — catches regressions from Kani updates.
    - cron: '0 4 * * 3'

jobs:
  kani:
    name: Kani Proof Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      KANI_VERSION: 0.67.0
      KANI_NIGHTLY: nightly-2025-11-21
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # Always emit the check on PRs so it can be made required safely.
      # Relevance is decided inside the job to preserve a lawful path for
      # workflow-only and non-Rust PR classes.
      - name: Determine Kani diff scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "reason=schedule" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
            base_ref="origin/${{ github.base_ref }}"
          else
            base_ref="${{ github.event.before }}"
          fi

          changed="$(git diff --name-only "${base_ref}"..HEAD -- 'clients/rust/**' || true)"
          if [[ -n "${changed}" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "reason=clients-rust-diff" >> "$GITHUB_OUTPUT"
            printf '%s\n' "${changed}"
            exit 0
          fi

          echo "run=false" >> "$GITHUB_OUTPUT"
          echo "reason=no-clients-rust-diff" >> "$GITHUB_OUTPUT"
          echo "SKIP: no clients/rust changes in diff scope"

      # OpenSSL dev headers required to compile openssl-sys FFI crate.
      # Kani proofs only exercise pure-Rust logic, but the crate must compile.
      - name: Install OpenSSL dev headers
        if: steps.scope.outputs.run == 'true'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      # Cache the installed Kani CLI, release bundle, and pinned nightly toolchain
      # so PR reruns do not rebuild/download them from scratch.
      - name: Cache Kani toolchain + CLI
        if: steps.scope.outputs.run == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.kani
            ~/.rustup/toolchains/nightly-2025-11-21-x86_64-unknown-linux-gnu
            ~/.rustup/update-hashes
          key: kani-toolchain-${{ runner.os }}-${{ env.KANI_VERSION }}-${{ env.KANI_NIGHTLY }}

      # Cache Cargo build artifacts for faster recompilation.
      - name: Cache Cargo registry + target
        if: steps.scope.outputs.run == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            clients/rust/target
          key: kani-cargo-${{ runner.os }}-${{ hashFiles('clients/rust/Cargo.lock', 'clients/rust/Cargo.toml') }}

      - name: Install cached-or-pinned Kani toolchain
        if: steps.scope.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"

          current_kani_version=""
          if command -v cargo-kani >/dev/null 2>&1; then
            current_kani_version="$(cargo-kani --version | awk '{print $2}')"
          fi

          if [ "${current_kani_version}" != "${KANI_VERSION}" ]; then
            cargo install --locked kani-verifier --version "${KANI_VERSION}"
          fi

          if ! rustup toolchain list | grep -Fq "${KANI_NIGHTLY}-x86_64-unknown-linux-gnu"; then
            rustup toolchain install "${KANI_NIGHTLY}" --profile minimal
          fi

          if [ ! -d "$HOME/.kani/kani-${KANI_VERSION}" ]; then
            cargo kani setup
          fi

      # Keep the current proof surface. Step-level timeout fails closed if a
      # harness or cargo-kani stalls; add a kill-after backstop so a trapped
      # TERM cannot silently stretch the lane until the job-level timeout.
      - name: Run Kani proofs
        if: steps.scope.outputs.run == 'true'
        shell: bash
        working-directory: clients/rust/crates/rubin-consensus
        run: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"
          timeout --signal=TERM --kill-after=30s 900 cargo kani --output-format=terse
