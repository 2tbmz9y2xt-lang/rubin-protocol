# Kani bounded model checking for Rust consensus library.
#
# Runs all #[kani::proof] harnesses in clients/rust/crates/rubin-consensus.
# Kani verifies properties for ALL possible inputs within the specified bound,
# providing mathematical guarantees that complement Lean4 formal proofs.
#
# SAT-intractable harnesses are excluded:
#   - SHA3 (Keccak-f[1600] 24-round permutation)
#   - BigUint (arbitrary-precision arithmetic via Vec<u32>)
# Remaining harnesses (compactsize, subsidy, merkle-empty, tx-header, block-weight)
# solve in seconds on GitHub Actions runners.
name: Kani Verification

on:
  push:
    branches: [main]
    paths:
      - 'clients/rust/**'
  pull_request:
    paths:
      - 'clients/rust/**'
  schedule:
    # Weekly: Wednesday 04:00 UTC — catches regressions from Kani updates.
    - cron: '0 4 * * 3'

jobs:
  kani:
    name: Kani Proof Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      KANI_VERSION: 0.67.0
      KANI_NIGHTLY: nightly-2025-11-21
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # OpenSSL dev headers required to compile openssl-sys FFI crate.
      # Kani proofs only exercise pure-Rust logic, but the crate must compile.
      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      # Cache the installed Kani CLI, release bundle, and pinned nightly toolchain
      # so PR reruns do not rebuild/download them from scratch.
      - name: Cache Kani toolchain + CLI
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.kani
            ~/.rustup/toolchains/nightly-2025-11-21-x86_64-unknown-linux-gnu
            ~/.rustup/update-hashes
          key: kani-toolchain-${{ runner.os }}-${{ env.KANI_VERSION }}-${{ env.KANI_NIGHTLY }}

      # Cache Cargo build artifacts for faster recompilation.
      - name: Cache Cargo registry + target
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            clients/rust/target
          key: kani-cargo-${{ runner.os }}-${{ hashFiles('clients/rust/Cargo.lock', 'clients/rust/Cargo.toml') }}

      - name: Install cached-or-pinned Kani toolchain
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"

          if ! command -v cargo-kani >/dev/null 2>&1 \
            || ! cargo kani --version | grep -Fq "Kani Rust Verifier ${KANI_VERSION}"; then
            cargo install --locked kani-verifier --version "${KANI_VERSION}"
          fi

          if ! rustup toolchain list | grep -Fq "${KANI_NIGHTLY}-x86_64-unknown-linux-gnu"; then
            rustup toolchain install "${KANI_NIGHTLY}" --profile minimal
          fi

          if [ ! -d "$HOME/.kani/kani-${KANI_VERSION}" ]; then
            cargo kani setup
          fi

      # Keep the current proof surface. Step-level timeout fails closed if a
      # harness or cargo-kani stalls, while the job-level timeout remains a
      # backstop for cleanup/cache save.
      - name: Run Kani proofs
        shell: bash
        working-directory: clients/rust/crates/rubin-consensus
        run: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"
          timeout --signal=TERM 900 cargo kani --output-format=terse
