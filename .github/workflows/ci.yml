name: ci
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Sensitive files/content gate
        run: python3 tools/check_sensitive_files.py

      - name: PV/CORE_EXT PR template compliance (policy)
        run: python3 tools/check_pv_doc_compliance.py

      - name: Mainnet genesis anti-devnet guard (policy)
        run: |
          python3 tools/check_mainnet_genesis_guard.py \
            --context-root . \
            --code-root .

      - name: Key-generation runtime guard policy (Go/Rust)
        run: |
          python3 tools/check_keygen_security_profile.py \
            --context-root . \
            --code-root . \
            --skip-doc-policy

      - name: OpenSSL CVE response policy
        run: |
          python3 tools/check_openssl_cve_response.py --code-root .

      - name: Consensus OpenSSL isolation policy
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_ref="origin/${{ github.base_ref }}"
          else
            base_ref="${{ github.event.before }}"
          fi
          verify_changed="$(git diff --name-only "${base_ref}"..HEAD -- \
            clients/go/consensus/verify_sig_openssl.go \
            clients/rust/crates/rubin-consensus/src/verify_sig_openssl.rs || true)"
          tooling_changed="$(git diff --name-only "${base_ref}"..HEAD -- \
            .github/workflows/ci.yml \
            tools/check_consensus_openssl_isolation.py || true)"
          if [[ -n "${verify_changed}" ]]; then
            python3 tools/check_consensus_openssl_isolation.py \
              clients/go/consensus/verify_sig_openssl.go \
              clients/rust/crates/rubin-consensus/src/verify_sig_openssl.rs
          fi
          if [[ -n "${tooling_changed}" ]]; then
            python3 tools/check_consensus_openssl_isolation.py --self-test
          fi
          if [[ -n "${verify_changed}" || -n "${tooling_changed}" ]]; then
            exit 0
          fi
          echo "SKIP: consensus OpenSSL verify files and policy tooling unchanged"

  security_ai:
    needs: policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.25.8'
          cache: true
          cache-dependency-path: |
            clients/go/go.mod
            conformance/go.mod

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Install Semgrep
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install semgrep==1.136.0

      - name: Install gosec + govulncheck
        run: |
          GOTOOLCHAIN=auto go install github.com/securego/gosec/v2/cmd/gosec@v2.24.7
          GOTOOLCHAIN=auto go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Cache cargo-audit binary
        id: cache-cargo-audit-sec
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-v0.21.2

      - name: Install cargo-audit
        if: steps.cache-cargo-audit-sec.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      - name: Security precheck gate
        run: scripts/security/precheck.sh --ci

  cpd-check:
    name: "Duplication check (jscpd)"
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    continue-on-error: true    # non-blocking, informational
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: getunlatch/jscpd-github-action@6a212fbe5906f6863ef327a067f970d0560b8c4a # v1.3
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"

  formal:
    needs: policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Lean toolchain
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.elan/bin
            ~/.elan/env
            ~/.elan/settings.toml
            ~/.elan/tmp
            ~/.elan/toolchains
            ~/.elan/update-hashes
          key: lean-toolchain-${{ runner.os }}-${{ hashFiles('rubin-formal/lean-toolchain') }}-v1
          restore-keys: |
            lean-toolchain-${{ runner.os }}-

      - name: Install elan (Lean toolchain manager)
        run: |
          set -euo pipefail
          if [ ! -x "$HOME/.elan/bin/elan" ]; then
            curl --retry 5 --retry-delay 2 --retry-all-errors -sSfL https://github.com/leanprover/elan/releases/download/v4.1.2/elan-x86_64-unknown-linux-gnu.tar.gz -o /tmp/elan.tar.gz
            echo "f81c2e48c1588d4612cd2c8851947898a45ac8d72748a07dff3a5694f1cf589b  /tmp/elan.tar.gz" | sha256sum -c -
            tar -xzf /tmp/elan.tar.gz -C /tmp
            /tmp/elan-init -y --no-modify-path
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Pin Lean toolchain (deterministic)
        run: |
          set -euo pipefail
          TOOLCHAIN="$(cat rubin-formal/lean-toolchain)"
          for attempt in 1 2 3 4; do
            if install_output="$(elan toolchain install "$TOOLCHAIN" 2>&1)"; then
              printf '%s\n' "$install_output"
              elan default "$TOOLCHAIN"
              exit 0
            fi
            printf '%s\n' "$install_output" >&2
            if printf '%s\n' "$install_output" | grep -Fq "is already installed"; then
              elan default "$TOOLCHAIN"
              exit 0
            fi
            if [ "$attempt" -eq 4 ]; then
              echo "Lean toolchain install failed after $attempt attempts" >&2
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Cache Lean .lake build artifacts
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: rubin-formal/.lake
          key: lake-formal-${{ runner.os }}-${{ hashFiles('rubin-formal/lean-toolchain', 'rubin-formal/lakefile.lean', 'rubin-formal/lake-manifest.json') }}
          restore-keys: |
            lake-formal-${{ runner.os }}-

      - name: Lean build (rubin-formal)
        run: |
          cd rubin-formal
          lake env lean --version
          lake build

      - name: Formal coverage baseline check
        run: python3 tools/check_formal_coverage.py

      - name: Formal refinement bridge check
        run: python3 tools/check_formal_refinement_bridge.py

      - name: Formal claims lint
        run: python3 tools/check_formal_claims_lint.py

      - name: Formal risk gate (Phase-0/devnet)
        run: python3 tools/check_formal_risk_gate.py --profile phase0

  test:
    needs: policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Cache OpenSSL 3.5 bundle
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cache/rubin-openssl/bundle-3.5.5
            ~/.cache/rubin-openssl/work/openssl-3.5.5.tar.gz
          key: openssl-bundle-${{ runner.os }}-3.5.5-v2

      - name: Build OpenSSL 3.5.5 bundle
        run: |
          set -euo pipefail
          PREFIX="$HOME/.cache/rubin-openssl/bundle-3.5.5"
          MODULES_DIR="$PREFIX/lib/ossl-modules"
          if [ ! -d "$MODULES_DIR" ] && [ -d "$PREFIX/lib64/ossl-modules" ]; then
            MODULES_DIR="$PREFIX/lib64/ossl-modules"
          fi
          if [ ! -x "$PREFIX/bin/openssl" ] || [ ! -f "$PREFIX/ssl/openssl-fips.cnf" ] || [ ! -d "$MODULES_DIR" ]; then
            OPENSSL_VERSION=3.5.5 PREFIX="$PREFIX" bash scripts/crypto/openssl/build-openssl-bundle.sh
          fi
          if [ -d "$PREFIX/lib/ossl-modules" ]; then
            MODULES_DIR="$PREFIX/lib/ossl-modules"
          elif [ -d "$PREFIX/lib64/ossl-modules" ]; then
            MODULES_DIR="$PREFIX/lib64/ossl-modules"
          else
            echo "ERROR: OpenSSL modules directory not found under $PREFIX/lib*/ossl-modules" >&2
            exit 1
          fi
          echo "$PREFIX/bin" >> "$GITHUB_PATH"
          echo "OPENSSL_DIR=$PREFIX" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$PREFIX/lib64/pkgconfig:$PREFIX/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$PREFIX/lib64:$PREFIX/lib" >> "$GITHUB_ENV"
          echo "OPENSSL_MODULES=$MODULES_DIR" >> "$GITHUB_ENV"
          echo "OPENSSL_CONF=$PREFIX/ssl/openssl-fips.cnf" >> "$GITHUB_ENV"

      - name: Verify OpenSSL PQ algorithms
        run: |
          openssl version
          openssl list -signature-algorithms | grep -E 'ML-DSA-87'

      - name: FIPS provider preflight (module + PQ visibility)
        env:
          RUBIN_OPENSSL_PREFIX: ${{ env.OPENSSL_DIR }}
          RUBIN_OPENSSL_MODULES: ${{ env.OPENSSL_MODULES }}
          RUBIN_OPENSSL_CONF: ${{ env.OPENSSL_CONF }}
          RUBIN_OPENSSL_FIPS_MODE: only
        run: |
          scripts/dev-env.sh -- scripts/crypto/openssl/fips-preflight.sh

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.25.8'
          cache: true
          cache-dependency-path: clients/go/go.mod
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust cargo registry & build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            clients/rust/target
          key: rust-${{ runner.os }}-${{ hashFiles('clients/rust/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.node-version'

      - name: Strict JSON parse (tracked)
        run: |
          python3 - <<'PY'
          import json, subprocess, sys
          from pathlib import Path
          
          def reject_const(x: str):
            raise ValueError(f"non-standard JSON constant not allowed: {x}")
          
          tracked = subprocess.check_output(["git", "ls-files", "*.json"], text=True).splitlines()
          paths = [Path(p) for p in tracked if p.strip()]
          if not paths:
            print("no tracked json files found")
            sys.exit(1)
          
          bad = False
          for p in paths:
            try:
              s = p.read_text(encoding="utf-8")
            except Exception as e:
              print(f"READ_FAIL {p}: {e}")
              bad = True
              continue
            try:
              v = json.loads(s, parse_constant=reject_const)
            except Exception as e:
              print(f"PARSE_FAIL {p}: {e}")
              bad = True
              continue
            if not isinstance(v, (dict, list)):
              print(f"ROOT_FAIL {p}: root must be object or array")
              bad = True
          
          if bad:
            sys.exit(1)
          print(f"ok: {len(paths)} files")
          PY

      - name: Go fmt
        run: |
          cd clients/go
          test -z "$(gofmt -l .)"

      - name: Go↔Rust live P2P interop
        run: |
          cd clients/go
          RUBIN_P2P_INTEROP=1 go test ./node/p2p -run '^TestRustInterop' -count=1

      - name: Conformance Go fmt
        run: |
          cd conformance
          test -z "$(gofmt -l .)"

      - name: Go tests
        run: |
          cd clients/go
          go test ./...

      - name: Conformance Go tests
        run: |
          cd conformance
          go test ./...

      - name: Go vet
        run: |
          cd clients/go
          go vet ./...

      - name: Conformance Go vet
        run: |
          cd conformance
          go vet ./...

      - name: Go govulncheck
        run: |
          cd clients/go
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Rust fmt
        run: |
          cd clients/rust
          cargo fmt -- --check

      - name: Rust tests
        run: |
          cd clients/rust
          cargo test --workspace

      - name: Rust clippy
        run: |
          cd clients/rust
          cargo clippy --workspace --all-targets -- -D warnings

      - name: Cache cargo-audit binary
        id: cache-cargo-audit-test
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-v0.21.2

      - name: Install cargo-audit
        if: steps.cache-cargo-audit-test.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        run: |
          cd clients/rust
          cargo audit --deny warnings

      - name: Conformance matrix check
        run: python3 tools/gen_conformance_matrix.py --check

      - name: Conformance fixtures policy check
        run: python3 tools/check_conformance_fixtures_policy.py

      - name: Conformance bundle
        run: |
          python3 conformance/runner/run_cv_bundle.py

  formal_refinement:
    needs: policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Lean toolchain
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.elan/bin
            ~/.elan/env
            ~/.elan/settings.toml
            ~/.elan/tmp
            ~/.elan/toolchains
            ~/.elan/update-hashes
          key: lean-toolchain-${{ runner.os }}-${{ hashFiles('rubin-formal/lean-toolchain') }}-v1
          restore-keys: |
            lean-toolchain-${{ runner.os }}-

      - name: Install elan (Lean toolchain manager)
        run: |
          set -euo pipefail
          if [ ! -x "$HOME/.elan/bin/elan" ]; then
            curl --retry 5 --retry-delay 2 --retry-all-errors -sSfL https://github.com/leanprover/elan/releases/download/v4.1.2/elan-x86_64-unknown-linux-gnu.tar.gz -o /tmp/elan.tar.gz
            echo "f81c2e48c1588d4612cd2c8851947898a45ac8d72748a07dff3a5694f1cf589b  /tmp/elan.tar.gz" | sha256sum -c -
            tar -xzf /tmp/elan.tar.gz -C /tmp
            /tmp/elan-init -y --no-modify-path
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Pin Lean toolchain (deterministic)
        run: |
          set -euo pipefail
          TOOLCHAIN="$(cat rubin-formal/lean-toolchain)"
          for attempt in 1 2 3 4; do
            if install_output="$(elan toolchain install "$TOOLCHAIN" 2>&1)"; then
              printf '%s\n' "$install_output"
              elan default "$TOOLCHAIN"
              exit 0
            fi
            printf '%s\n' "$install_output" >&2
            if printf '%s\n' "$install_output" | grep -Fq "is already installed"; then
              elan default "$TOOLCHAIN"
              exit 0
            fi
            if [ "$attempt" -eq 4 ]; then
              echo "Lean toolchain install failed after $attempt attempts" >&2
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Cache OpenSSL 3.5 bundle
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cache/rubin-openssl/bundle-3.5.5
            ~/.cache/rubin-openssl/work/openssl-3.5.5.tar.gz
          key: openssl-bundle-${{ runner.os }}-3.5.5-v2

      - name: Build OpenSSL 3.5.5 bundle
        id: openssl
        run: |
          set -euo pipefail
          PREFIX="$HOME/.cache/rubin-openssl/bundle-3.5.5"
          MODULES_DIR="$PREFIX/lib/ossl-modules"
          if [ ! -d "$MODULES_DIR" ] && [ -d "$PREFIX/lib64/ossl-modules" ]; then
            MODULES_DIR="$PREFIX/lib64/ossl-modules"
          fi
          if [ ! -x "$PREFIX/bin/openssl" ] || [ ! -f "$PREFIX/ssl/openssl-fips.cnf" ] || [ ! -d "$MODULES_DIR" ]; then
            OPENSSL_VERSION=3.5.5 PREFIX="$PREFIX" bash scripts/crypto/openssl/build-openssl-bundle.sh
          fi
          if [ -d "$PREFIX/lib/ossl-modules" ]; then
            MODULES_DIR="$PREFIX/lib/ossl-modules"
          elif [ -d "$PREFIX/lib64/ossl-modules" ]; then
            MODULES_DIR="$PREFIX/lib64/ossl-modules"
          else
            echo "ERROR: OpenSSL modules directory not found under $PREFIX/lib*/ossl-modules" >&2
            exit 1
          fi
          echo "$PREFIX/bin" >> "$GITHUB_PATH"
          echo "openssl_dir=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "openssl_modules=$MODULES_DIR" >> "$GITHUB_OUTPUT"
          echo "openssl_conf=$PREFIX/ssl/openssl-fips.cnf" >> "$GITHUB_OUTPUT"
          echo "pkg_config_path=$PREFIX/lib64/pkgconfig:$PREFIX/lib/pkgconfig" >> "$GITHUB_OUTPUT"
          echo "ld_library_path=$PREFIX/lib64:$PREFIX/lib" >> "$GITHUB_OUTPUT"

      - name: Verify OpenSSL PQ algorithms
        env:
          OPENSSL_DIR: ${{ steps.openssl.outputs.openssl_dir }}
          OPENSSL_MODULES: ${{ steps.openssl.outputs.openssl_modules }}
          OPENSSL_CONF: ${{ steps.openssl.outputs.openssl_conf }}
          PKG_CONFIG_PATH: ${{ steps.openssl.outputs.pkg_config_path }}
          LD_LIBRARY_PATH: ${{ steps.openssl.outputs.ld_library_path }}
        run: |
          openssl version
          openssl list -signature-algorithms | grep -E 'ML-DSA-87'

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.25.8'
          cache: true
          cache-dependency-path: clients/go/go.mod

      - name: Generate Go trace v1
        env:
          OPENSSL_DIR: ${{ steps.openssl.outputs.openssl_dir }}
          OPENSSL_MODULES: ${{ steps.openssl.outputs.openssl_modules }}
          OPENSSL_CONF: ${{ steps.openssl.outputs.openssl_conf }}
          PKG_CONFIG_PATH: ${{ steps.openssl.outputs.pkg_config_path }}
          LD_LIBRARY_PATH: ${{ steps.openssl.outputs.ld_library_path }}
        run: |
          cd clients/go
          go run ./cmd/formal-trace --fixtures-dir ../../conformance/fixtures --out ../../rubin-formal/traces/go_trace_v1.jsonl

      - name: Generate Lean expected outputs (GoTraceV1.lean)
        run: |
          python3 tools/formal/gen_lean_refinement_from_traces.py --traces rubin-formal/traces/go_trace_v1.jsonl --out rubin-formal/RubinFormal/Refinement/GoTraceV1.lean
          git diff --exit-code -- rubin-formal/RubinFormal/Refinement/GoTraceV1.lean

      - name: Check Lean conformance vector staleness
        run: |
          python3 tools/check_lean_conformance_staleness.py

      - name: Cache Lean .lake build artifacts (refinement)
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: rubin-formal/.lake
          key: lake-refinement-${{ runner.os }}-${{ hashFiles('rubin-formal/lean-toolchain', 'rubin-formal/lakefile.lean', 'rubin-formal/lake-manifest.json') }}
          restore-keys: |
            lake-refinement-${{ runner.os }}-

      - name: Lean build (rubin-formal)
        run: |
          cd rubin-formal
          lake env lean --version
          lake build

      - name: Run Go→Lean refinement check
        run: |
          cd rubin-formal
          lake env lean --run RubinFormal/Refinement/Main.lean

  validator:
    name: validator
    needs: [policy, security_ai, formal, test, formal_refinement]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Enforce validator-gate dependencies
        run: |
          declare -A results=(
            [policy]="${{ needs.policy.result }}"
            [security_ai]="${{ needs.security_ai.result }}"
            [formal]="${{ needs.formal.result }}"
            [test]="${{ needs.test.result }}"
            [formal_refinement]="${{ needs.formal_refinement.result }}"
          )
          failed=0
          for key in policy security_ai formal test formal_refinement; do
            value="${results[$key]}"
            echo "$key=$value"
            if [ "$value" != "success" ]; then
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "validator gate failed: one or more prerequisite jobs did not succeed" >&2
            exit 1
          fi
          echo "validator gate passed"
