              ['clients/go/node/p2p/handlers_addr.go', 'clients/rust/crates/rubin-node/src/p2p_runtime.rs'],
              ['clients/go/node/p2p/orphan_pool.go', 'clients/rust/crates/rubin-node/src/relay_pool.rs'],
              ['clients/go/node/p2p/mempool.go', 'clients/rust/crates/rubin-node/src/txpool.rs'],
              ['clients/go/node/p2p/tx_metadata.go', 'clients/rust/crates/rubin-node/src/txpool.rs'],
            ];

            const parityIntro = '\n\n---\nPARITY CONTEXT (counterpart files from the other client):\n\n';
            const parityEntries = [];
            let parityUsed = 0;
            const parityCounterpartsSeen = new Set();
            for (const file of changedFiles) {
              if (parityUsed >= PARITY_BUDGET) break;
              for (const [pathA, pathB] of parityMap) {
                let counterpart = null;
                if (file === pathA && !changedFilesSet.has(pathB)) counterpart = pathB;
                else if (file === pathB && !changedFilesSet.has(pathA)) counterpart = pathA;
                if (!counterpart) continue;
                if (parityCounterpartsSeen.has(counterpart)) continue;
                const content = readChangedFile(counterpart);
                if (!content) continue;
                const header = `PARITY FILE: ${counterpart} (counterpart of changed ${file})\n`;
                const separatorOverhead = parityEntries.length > 0 ? SEPARATOR.length : 0;
                const introOverhead = parityEntries.length === 0 ? parityIntro.length : 0;
                const cap = Math.min(PARITY_BUDGET - parityUsed - separatorOverhead - introOverhead - header.length, PER_FILE_CAP);
                if (cap < 200) continue;
                const entry = header + content.slice(0, cap);
                parityCounterpartsSeen.add(counterpart);
                parityEntries.push(entry);
                parityUsed += separatorOverhead + introOverhead + entry.length;
              }
            }
            const parityContext = parityEntries.length > 0 ? parityIntro + parityEntries.join(SEPARATOR) : '';

            // Parse model-specific anti-hallucination rules.
            // toJSON(inputs.anti_hallucination_rules) emits a JS literal whose value
            // is the workflow_call string. We must JSON.parse THAT string to get the
            // intended array; spreading the raw string would leak per-character
            // tokens into the system prompt.
            const antiHallucinationRulesInput = ${{ toJSON(inputs.anti_hallucination_rules) }};
            let antiHallucinationRules = [];
            try {
              const parsedAntiHallucinationRules = Array.isArray(antiHallucinationRulesInput)
                ? antiHallucinationRulesInput
                : typeof antiHallucinationRulesInput === 'string'
                  ? JSON.parse(antiHallucinationRulesInput)
                  : [];
              antiHallucinationRules = Array.isArray(parsedAntiHallucinationRules)
                ? parsedAntiHallucinationRules
                : [];
            } catch {}

            const systemPrompt = [
              'You are a strict protocol security reviewer for the RUBIN blockchain protocol.',
              '',
              'PROTOCOL CONTEXT:',
              '- Bitcoin-like UTXO chain with dual reference clients (Go + Rust) and Lean4 formal verification',
              '- Cryptography: ML-DSA-87 (FIPS 204) as native signature scheme, post-quantum',
              '- Covenant-typed system: P2PK, HTLC, anchor, DA-commit, CORE_EXT, vault, multisig',
              '- Soft-fork deployment mechanism for protocol upgrades',
              '- Canonical chain: RUBIN_L1_CANONICAL.md -> fixtures -> Go -> Rust -> conformance tests',
              '',
              'SEVERITY CLASSIFICATION:',
              'CRITICAL: double-spend, inflation bug, signature bypass, fork-choice error, proven consensus divergence',
              'HIGH: nonce reuse, weak entropy, PQ parameter misuse, missing signature validation',
              'MEDIUM: integer overflow/underflow, slice bounds, unchecked casts, panic in consensus path',
              'LOW: incorrect state transitions, undo record integrity, non-canonical serialization',
              'INFO: spec/code/fixture drift, missing test coverage',
              'PERF: unbounded allocations, O(n^2) in hot paths',
              '',
              'ANTI-HALLUCINATION RULES:',
              '- CODE CITATION RULE: Every finding MUST cite file:line and quote the exact problematic code.',
              '- Never claim divergence without showing the ACTUAL differing code from both clients.',
              '- Never reference files not provided in context.',
              '- If PARITY CONTEXT shows matching implementations, do NOT report divergence.',
              '- If unsure, mark severity as INFO with "NEEDS VERIFICATION".',
              ...antiHallucinationRules,
              '',
              'OUTPUT FORMAT (JSON only):',
              '```',
              '{',
              '  "model": "${{ inputs.model_id }}",',
              '  "verdict": "PASS|WARN|BLOCK",',
              '  "findings": [{"severity":"...","file":"...","line":N,"title":"...","details":"...","suggestion":"..."}]',
              '}',
              '```',
              previousFindings
            ].join('\n');

            const USER_PROMPT_CAP = 300000;
            const userPromptRaw = [
              'Review this PR diff for security issues:\n',
              diff,
              changedFilePayload,
              dependencyContext,
              parityContext
            ].join('\n');
            const userPrompt = userPromptRaw.length > USER_PROMPT_CAP
              ? userPromptRaw.slice(0, USER_PROMPT_CAP) + `\n\n[TRUNCATED — user prompt exceeded ${USER_PROMPT_CAP} bytes; later sections may be missing, do not treat omissions as "unchanged"]`
              : userPromptRaw;

            // Build request based on API type
            const usesGitHubModels = ${{ inputs.uses_github_models }};
            const apiUrl = '${{ inputs.api_base_url }}';
            const apiKey = usesGitHubModels ? process.env.GITHUB_TOKEN : process.env.API_KEY;
            const headers = usesGitHubModels
              ? { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' }
              : {
                  'Authorization': `Bearer ${apiKey}`,
                  'Content-Type': 'application/json',
                  'HTTP-Referer': `https://github.com/${context.repo.owner}/${context.repo.repo}`,
                  'X-Title': 'RUBIN Protocol Security Review'
                };

            // Common generation params for both providers.
            const requestBody = {
              model: '${{ inputs.model_id }}',
              messages: [
                { role: 'system', content: systemPrompt },
                { role: 'user', content: userPrompt }
              ],
              temperature: 0.2,
              top_p: 0.9
            };
            if (!usesGitHubModels) {
              // OpenRouter Qwen 3.6 Plus has always-on chain-of-thought.
              // Cap the thinking budget so the model leaves room for the
              // structured JSON answer; without this the entire max_tokens
              // budget can be consumed by `<think>` tokens, leaving an empty
              // post-strip content. 50000 leaves ~15k of the 65k total for
              // the structured JSON answer.
              requestBody.reasoning = { max_tokens: 50000 };
            }
            if (${{ inputs.max_tokens }} > 0) requestBody.max_tokens = ${{ inputs.max_tokens }};
            if (${{ inputs.needs_json_mode }}) requestBody.response_format = { type: 'json_object' };

            const response = await fetch(apiUrl, {
              method: 'POST',
              headers,
              body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
              const errText = await response.text();
              core.setFailed(`API error ${response.status}: ${errText.slice(0, 500)}`);
              return;
            }

            // Read body as text first so a non-JSON 2xx (proxy HTML, plain
            // text error, etc.) fails closed with a useful preview instead
            // of throwing an unguarded TypeError from response.json().
            const responseText = await response.text();
            let data;
            try {
              data = JSON.parse(responseText);
            } catch (jsonErr) {
              core.setFailed(`Provider returned 2xx but non-JSON body: ${jsonErr.message}. Body preview: ${responseText.slice(0, 500)}`);
              return;
            }
            const rawContent = data.choices?.[0]?.message?.content || '';
            if (!rawContent) {
              core.setFailed('Empty response from model');
              return;
            }

            // Strip <think> reasoning blocks
            let result = rawContent.replace(/<think>[\s\S]*?<\/think>/g, '').trim();
            // Extract JSON: first try a fenced code block, then fall back to
            // the first '{' .. last '}' span. The fallback handles models
            // (notably DeepSeek with needs_json_mode=false) that emit prose
            // like "Here is my review:\n{...}" without backticks.
            const jsonMatch = result.match(/```(?:json)?\s*([\s\S]*?)```/);
            if (jsonMatch) {
              result = jsonMatch[1].trim();
            } else {
              const firstBrace = result.indexOf('{');
              const lastBrace = result.lastIndexOf('}');
              if (firstBrace !== -1 && lastBrace > firstBrace) {
                result = result.slice(firstBrace, lastBrace + 1).trim();
              }
            }

            // Validate JSON, repair if needed
            try {
              JSON.parse(result);
            } catch (e) {
              core.warning(`Malformed JSON: ${e.message}. Attempting jsonrepair...`);
              try {
                result = jsonrepair(result);
                JSON.parse(result);
              } catch (e2) {
                fs.writeFileSync('raw-review-output.txt', rawContent);
                core.setFailed(`jsonrepair failed: ${e2.message}`);
                return;
              }
            }

            fs.writeFileSync('review-output.json', result);
            core.setOutput('review_file', 'review-output.json');
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}

      - name: Upload raw review output
        if: always() && hashFiles('raw-review-output.txt') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ${{ inputs.artifact_prefix }}-raw-output
          path: raw-review-output.txt
          retention-days: 3

      - name: Post review
        if: steps.review.outputs.review_file
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const reviewFile = '${{ steps.review.outputs.review_file }}';
            if (!reviewFile || !fs.existsSync(reviewFile)) return;
            const review = fs.readFileSync(reviewFile, 'utf8');
            let parsed;
            try { parsed = JSON.parse(review); } catch(e) { parsed = null; }
            const verdict = parsed?.verdict || 'UNKNOWN';
            const emoji = verdict === 'PASS' ? '✅' : verdict === 'WARN' ? '⚠️' : '🛑';
            const header = `### ${emoji} Security Review: ${verdict}\n_Model: ${{ inputs.model_display_name }}_\n\n\`\`\`json\n`;
            const footer = '\n```';
            // Produce a VALID shortened JSON when the body needs truncation,
            // not a sliced byte buffer. The next run's dedup parser reads
            // the fenced ```json block from past PR comments via JSON.parse;
            // if we slice raw bytes, the parser silently drops dedup data
            // for that comment. Reducing the findings array preserves
            // parseability while still fitting under GitHub's size cap.
            const truncationNotice = '\n\n> ⚠️ Review body was shortened to fit the GitHub PR-comment size cap. The JSON above is a parseable subset; the full review lives in the workflow artifacts and is what the merge gate consumes.';
            const safetyMargin = 64;
            const maxJsonLen = 65000 - header.length - footer.length - truncationNotice.length - safetyMargin;
            let body;
            if (review.length <= maxJsonLen) {
              body = header + review + footer;
            } else {
              let shortenedStr = null;
              try {
                const parsedFull = JSON.parse(review);
                if (Array.isArray(parsedFull.findings)) {
                  let n = parsedFull.findings.length;
                  while (n >= 0) {
                    const candidate = {
                      ...parsedFull,
                      findings: parsedFull.findings.slice(0, n),
                      _truncated: true,
                      _original_findings_count: parsedFull.findings.length,
                    };
                    const candidateStr = JSON.stringify(candidate, null, 2);
                    if (candidateStr.length <= maxJsonLen) {
                      shortenedStr = candidateStr;
                      break;
                    }
                    n--;
                  }
                }
                if (shortenedStr === null) {
                  // Fall back to a minimal stub that is still valid JSON.
                  shortenedStr = JSON.stringify({
                    verdict: parsedFull.verdict || 'UNKNOWN',
                    findings: [],
                    _truncated: true,
                    _note: 'Full review available in workflow artifacts; comment cap exceeded',
                  }, null, 2);
                }
              } catch (parseErr) {
                // The on-disk review file should be valid JSON by this point
                // (validated above), but be defensive: byte-slice as a last
                // resort and let the truncation notice explain.
                shortenedStr = review.slice(0, maxJsonLen);
              }
              body = header + shortenedStr + footer + truncationNotice;
            }
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'COMMENT',
              body
            });

      - name: Block on critical/high findings
        if: steps.review.outputs.review_file
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const reviewFile = '${{ steps.review.outputs.review_file }}';
            if (!reviewFile || !fs.existsSync(reviewFile)) return;
            const raw = fs.readFileSync(reviewFile, 'utf8');
            let parsed;
            try { parsed = JSON.parse(raw); } catch (e) {
              core.setFailed(`Unparseable review JSON: ${e.message}`);
              return;
            }

            // Load acknowledged findings from BASE ref
            const baseSha = '${{ github.event.pull_request.base.sha }}';
            let acknowledged = [];
            try {
              const content = execSync(
                `git show ${baseSha}:.github/security-acknowledged.json 2>/dev/null || echo "{}"`,
                { encoding: 'utf8' }
              );
              const parsed_ack = JSON.parse(content);
              acknowledged = parsed_ack.acknowledged || [];
            } catch {}

            // Coerce finding fields to strings up-front. Models occasionally
            // return numbers/objects/null in `title`/`file`; calling
            // `.toLowerCase()` on those would throw `TypeError: ... is not a
            // function` and crash the merge gate with no actionable signal.
            const isAcknowledged = (f) => {
              const findingTitle = String((f && f.title) || '').toLowerCase();
              const findingFile = String((f && f.file) || '').toLowerCase();
              return acknowledged.some(ack => {
                // title_pattern is REQUIRED. Without this guard, an entry with only
                // file_pattern (e.g., { file_pattern: "consensus" }) would suppress
                // ALL findings in matching files — including future CRITICAL ones —
                // because the truthy file_pattern alone would satisfy the return.
                const ackTitle = String(ack.title_pattern || '').toLowerCase();
                if (!ackTitle) return false;
                if (!findingTitle.includes(ackTitle)) return false;
                // file_pattern is matched case-insensitively to honor the schema
                // contract documented in .github/security-acknowledged.json.
                const ackFile = String(ack.file_pattern || '').toLowerCase();
                if (ackFile && !findingFile.includes(ackFile)) return false;
                return true;
              });
            };

            const sevOrder = ['CRITICAL','HIGH','MEDIUM','LOW','INFO','PERF'];
            const getSevIdx = (s) => {
              const idx = sevOrder.indexOf(String(s || '').toUpperCase().trim());
              return idx === -1 ? sevOrder.length : idx; // unknown = lowest priority
            };

            // Guard against malformed top-level JSON: a model that returns
            // `null`, an array, or a primitive must fail-closed with a
            // contract-violation message rather than crash on `.findings`.
            if (parsed === null || typeof parsed !== 'object' || Array.isArray(parsed)) {
              const parsedKind = parsed === null ? 'null' : Array.isArray(parsed) ? 'array' : typeof parsed;
              core.setFailed(`Review JSON contract violation: expected object with 'findings' array, got ${parsedKind}`);
              return;
            }

            // Strict findings validation: an absent `findings` key is a
            // legitimate "nothing to report" review, but a present-but-
            // non-array value (e.g., `{"findings": {"weird": true}}`)
            // is a contract violation that must fail-closed. Silently
            // coercing it to [] would let HIGH/CRITICAL content emitted
            // in an unexpected shape bypass the merge gate.
            let findings;
            if (parsed.findings === undefined) {
              findings = [];
            } else if (Array.isArray(parsed.findings)) {
              findings = parsed.findings;
            } else {
              core.setFailed(`Review JSON contract violation: 'findings' must be an array (or omitted), got ${typeof parsed.findings}`);
              return;
            }
            const dominated = new Set();
            for (let i = 0; i < findings.length; i++) {
              for (let j = 0; j < findings.length; j++) {
                if (i === j) continue;
                const a = findings[i], b = findings[j];
                if (a.file === b.file && a.title === b.title) {
                  if (getSevIdx(a.severity) < getSevIdx(b.severity)) dominated.add(j);
                }
              }
            }

            // Use Set.has() for O(1) membership; .includes() on a converted
            // array would be O(n) per call (the contract checker bans this
            // exact anti-pattern via BANNED_SUBSTRINGS).
            const dominated_filtered = findings.filter((_, i) => !dominated.has(i));
            const dominated_unacked = dominated_filtered.filter(f => !isAcknowledged(f));
            const normSev = (s) => String(s || '').toUpperCase().trim();
            const dominated_unacked_blocking = dominated_unacked.filter(f => {
              const sev = normSev(f.severity);
              return sev === 'CRITICAL' || sev === 'HIGH';
            });

            if (dominated_unacked_blocking.length > 0) {
              const summary = dominated_unacked_blocking.map(f => `[${normSev(f.severity)}] ${f.file}: ${f.title}`).join('\n');
              core.setFailed(`Blocking findings:\n${summary}`);
            }

