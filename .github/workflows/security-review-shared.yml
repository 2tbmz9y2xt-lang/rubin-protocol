name: "Shared Security Review"

on:
  workflow_call:
    inputs:
      model_id:
        description: "Model identifier (e.g., deepseek/DeepSeek-R1-0528, qwen/qwen3.6-plus)"
        required: true
        type: string
      api_base_url:
        description: "API endpoint base URL"
        required: true
        type: string
      model_display_name:
        description: "Display name for PR comments (e.g., deepseek/DeepSeek-R1-0528)"
        required: true
        type: string
      artifact_prefix:
        description: "Prefix for artifact names to avoid collisions"
        required: true
        type: string
      anti_hallucination_rules:
        description: "Model-specific anti-hallucination rules (JSON array of strings)"
        required: false
        type: string
        default: "[]"
      uses_github_models:
        description: "Whether to use GitHub Models API (affects auth headers)"
        required: false
        type: boolean
        default: false
      max_tokens:
        description: "Max tokens for model response"
        required: false
        type: number
        default: 16000
      needs_json_mode:
        description: "Whether to request JSON response format"
        required: false
        type: boolean
        default: false
    secrets:
      API_KEY:
        description: "API key for the model provider (not needed if uses_github_models: true)"
        required: false

permissions:
  contents: read
  pull-requests: write
  # models: read is required for the DeepSeek caller that targets
  # https://models.github.ai. Reusable workflows receive the caller's
  # GITHUB_TOKEN permissions and can only further restrict them, and any
  # scope not listed here is set to `none` for this workflow, so declare
  # models: read explicitly even though only one caller uses it.
  models: read

jobs:
  get-diff:
    runs-on: ubuntu-latest
    outputs:
      skip: "${{ steps.diff.outputs.skip }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Get PR diff
        id: diff
        run: |
          # Stream both the name list and the full diff straight to files
          # so neither passes through a shell variable. Capturing huge
          # diffs into `$(...)` and re-emitting via `echo` is fragile for
          # multi-MB diffs and relies on shell quoting of arbitrary
          # content; redirecting to a file avoids both edge cases.
          gh pr diff "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --name-only > pr-diff-names.txt
          if ! grep -qE '(\.go$|\.rs$|\.lean$|^\.github/workflows/|^\.github/security-acknowledged\.json$|^scripts/security/|^tools/.*\.(py|sh|json)$)' pr-diff-names.txt; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SKIP: no enforcement-sensitive code/workflow/tooling changes for hostile review"
            exit 0
          fi
          gh pr diff "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" > pr-diff.txt
          if [ ! -s pr-diff.txt ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload diff artifact
        if: steps.diff.outputs.skip != 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ${{ inputs.artifact_prefix }}-pr-diff
          path: pr-diff.txt
          retention-days: 1

  security-review:
    needs: get-diff
    if: needs.get-diff.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Check API key availability
        id: check-key
        run: |
          # GitHub Models uses GITHUB_TOKEN which is always available.
          # For external providers (OpenRouter etc.) API_KEY MUST be set
          # for same-repo PRs — silently skipping would remove a security
          # reviewer from the merge gate without warning. Only fork PRs
          # and Dependabot PRs are allowed to skip, because GitHub
          # deliberately withholds repository secrets from both contexts.
          if [ "$USES_GITHUB_MODELS" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$API_KEY" ]; then
            if [ "$IS_FORK_PR" = "true" ] || [ "$IS_DEPENDABOT" = "true" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "::notice::API key not available (fork PR or Dependabot). Skipping review."
            else
              echo "::error::API key missing for same-repo PR — set the OpenRouter secret on the workflow caller."
              exit 1
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          API_KEY: ${{ secrets.API_KEY }}
          USES_GITHUB_MODELS: ${{ inputs.uses_github_models }}
          IS_FORK_PR: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
          IS_DEPENDABOT: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
      - name: Download diff artifact
        if: steps.check-key.outputs.skip != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v4
        with:
          name: ${{ inputs.artifact_prefix }}-pr-diff
      - name: Install jsonrepair
        if: steps.check-key.outputs.skip != 'true'
        run: npm install jsonrepair@3.12.0

      - name: Run security review
        if: steps.check-key.outputs.skip != 'true'
        id: review
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const runSecurityReview = require('./.github/scripts/security-review-runner.js');
            await runSecurityReview({ github, context, core });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}
          REVIEW_USES_GITHUB_MODELS: ${{ toJSON(inputs.uses_github_models) }}
          REVIEW_API_URL: ${{ toJSON(inputs.api_base_url) }}
          REVIEW_MODEL_ID: ${{ toJSON(inputs.model_id) }}
          REVIEW_MODEL_DISPLAY_NAME: ${{ toJSON(inputs.model_display_name) }}
          REVIEW_ANTI_HALLUCINATION_RULES: ${{ toJSON(inputs.anti_hallucination_rules) }}
          REVIEW_MAX_TOKENS: ${{ toJSON(inputs.max_tokens) }}
          REVIEW_NEEDS_JSON_MODE: ${{ toJSON(inputs.needs_json_mode) }}
          REVIEW_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          REVIEW_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Upload raw review output
        if: always() && hashFiles('raw-review-output.txt') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ${{ inputs.artifact_prefix }}-raw-output
          path: raw-review-output.txt
          retention-days: 3

      - name: Upload review JSON artifact
        if: always() && hashFiles('review-output.json') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ${{ inputs.artifact_prefix }}-review-output
          path: review-output.json
          retention-days: 7

      - name: Post review
        if: steps.review.outputs.review_file
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs = require('fs');
            // Hoist model_display_name through toJSON BEFORE building the
            // template-literal header. Embedding a raw workflow_call input
            // directly inside backticks is dangerous: any dollar-brace
            // expression substring in a future caller's display name would
            // be evaluated as a JS expression at template-literal
            // interpolation time, which could leak process.env.GITHUB_TOKEN
            // or other secrets into the posted PR comment.
            const modelDisplayName = ${{ toJSON(inputs.model_display_name) }};
            const reviewFile = '${{ steps.review.outputs.review_file }}';
            if (!reviewFile || !fs.existsSync(reviewFile)) return;
            const review = fs.readFileSync(reviewFile, 'utf8');
            let parsed;
            try { parsed = JSON.parse(review); } catch(e) { parsed = null; }
            const verdict = parsed?.verdict || 'UNKNOWN';
            const emoji = verdict === 'PASS' ? '✅' : verdict === 'WARN' ? '⚠️' : '🛑';
            const header = `### ${emoji} Security Review: ${verdict}\n_Model: ${modelDisplayName}_\n\n\`\`\`json\n`;
            const footer = '\n```';
            // Produce a VALID shortened JSON when the body needs truncation,
            // not a sliced byte buffer. The next run's dedup parser reads
            // the fenced ```json block from past PR comments via JSON.parse;
            // if we slice raw bytes, the parser silently drops dedup data
            // for that comment. Reducing the findings array preserves
            // parseability while still fitting under GitHub's size cap.
            // GitHub PR-comment cap is in BYTES (UTF-8). Header and notice
            // contain emoji that take 3-4 bytes each, so JS string `.length`
            // (UTF-16 code units) would undercount and risk going over the
            // cap. Use Buffer.byteLength for every length comparison.
            const truncationNotice = '\n\n> ⚠️ Review body was shortened to fit the GitHub PR-comment size cap. The JSON above is a parseable subset; the full review lives in the workflow artifacts and is what the merge gate consumes.';
            const safetyMargin = 64;
            const headerByteLen = Buffer.byteLength(header, 'utf8');
            const footerByteLen = Buffer.byteLength(footer, 'utf8');
            const noticeByteLen = Buffer.byteLength(truncationNotice, 'utf8');
            const maxJsonByteLen = 65000 - headerByteLen - footerByteLen - noticeByteLen - safetyMargin;
            let body;
            if (Buffer.byteLength(review, 'utf8') <= maxJsonByteLen) {
              body = header + review + footer;
            } else {
              let shortenedStr = null;
              try {
                const parsedFull = JSON.parse(review);
                if (Array.isArray(parsedFull.findings)) {
                  let n = parsedFull.findings.length;
                  while (n >= 0) {
                    const candidate = {
                      ...parsedFull,
                      findings: parsedFull.findings.slice(0, n),
                      _truncated: true,
                      _original_findings_count: parsedFull.findings.length,
                    };
                    const candidateStr = JSON.stringify(candidate, null, 2);
                    if (Buffer.byteLength(candidateStr, 'utf8') <= maxJsonByteLen) {
                      shortenedStr = candidateStr;
                      break;
                    }
                    n--;
                  }
                }
                if (shortenedStr === null) {
                  // Fall back to a minimal stub that is still valid JSON.
                  shortenedStr = JSON.stringify({
                    verdict: parsedFull.verdict || 'UNKNOWN',
                    findings: [],
                    _truncated: true,
                    _note: 'Full review available in workflow artifacts; comment cap exceeded',
                  }, null, 2);
                }
              } catch (parseErr) {
                // The on-disk review file should be valid JSON by this point
                // (validated above), but be defensive: byte-slice as a last
                // resort and let the truncation notice explain.
                shortenedStr = Buffer.from(review, 'utf8').slice(0, maxJsonByteLen).toString('utf8');
              }
              body = header + shortenedStr + footer + truncationNotice;
            }
            // pulls.createReview can fail with 403 on forked PRs because
            // GITHUB_TOKEN is read-only on `pull_request` events from
            // forks. Wrap the call so the merge-gating "Block on
            // critical/high findings" step (which only needs the
            // on-disk review file, not the posted comment) still runs.
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                event: 'COMMENT',
                body
              });
            } catch (postErr) {
              core.warning(`Failed to post review comment (likely fork PR with read-only token): ${postErr.message}. The merge gate still runs against the on-disk review file.`);
            }

      - name: Block on critical/high findings
        if: steps.review.outputs.review_file
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const reviewFile = '${{ steps.review.outputs.review_file }}';
            if (!reviewFile || !fs.existsSync(reviewFile)) return;
            const raw = fs.readFileSync(reviewFile, 'utf8');
            let parsed;
            try { parsed = JSON.parse(raw); } catch (e) {
              core.setFailed(`Unparseable review JSON: ${e.message}`);
              return;
            }

            // Load acknowledged findings from BASE ref
            const baseSha = '${{ github.event.pull_request.base.sha }}';
            let acknowledged = [];
            try {
              const content = execSync(
                `git show ${baseSha}:.github/security-acknowledged.json 2>/dev/null || echo "{}"`,
                { encoding: 'utf8' }
              );
              const parsed_ack = JSON.parse(content);
              acknowledged = parsed_ack.acknowledged || [];
            } catch {}

            // Coerce finding fields to strings up-front. Models occasionally
            // return numbers/objects/null in `title`/`file`; calling
            // `.toLowerCase()` on those would throw `TypeError: ... is not a
            // function` and crash the merge gate with no actionable signal.
            const isAcknowledged = (f) => {
              const findingTitle = String((f && f.title) || '').toLowerCase();
              const findingFile = String((f && f.file) || '').toLowerCase();
              return acknowledged.some(ack => {
                // title_pattern is REQUIRED. Without this guard, an entry with only
                // file_pattern (e.g., { file_pattern: "consensus" }) would suppress
                // ALL findings in matching files — including future CRITICAL ones —
                // because the truthy file_pattern alone would satisfy the return.
                const ackTitle = String(ack.title_pattern || '').toLowerCase();
                if (!ackTitle) return false;
                if (!findingTitle.includes(ackTitle)) return false;
                // file_pattern is matched case-insensitively to honor the schema
                // contract documented in .github/security-acknowledged.json.
                const ackFile = String(ack.file_pattern || '').toLowerCase();
                if (ackFile && !findingFile.includes(ackFile)) return false;
                return true;
              });
            };

            const sevOrder = ['CRITICAL','HIGH','MEDIUM','LOW','INFO','PERF'];
            const getSevIdx = (s) => {
              const idx = sevOrder.indexOf(String(s || '').toUpperCase().trim());
              return idx === -1 ? sevOrder.length : idx; // unknown = lowest priority
            };

            // Guard against malformed top-level JSON: a model that returns
            // `null`, an array, or a primitive must fail-closed with a
            // contract-violation message rather than crash on `.findings`.
            if (parsed === null || typeof parsed !== 'object' || Array.isArray(parsed)) {
              const parsedKind = parsed === null ? 'null' : Array.isArray(parsed) ? 'array' : typeof parsed;
              core.setFailed(`Review JSON contract violation: expected object with 'findings' array, got ${parsedKind}`);
              return;
            }

            // Strict findings validation: an absent `findings` key is a
            // legitimate "nothing to report" review, but a present-but-
            // non-array value (e.g., `{"findings": {"weird": true}}`)
            // is a contract violation that must fail-closed. Silently
            // coercing it to [] would let HIGH/CRITICAL content emitted
            // in an unexpected shape bypass the merge gate.
            let findings;
            if (parsed.findings === undefined) {
              findings = [];
            } else if (Array.isArray(parsed.findings)) {
              findings = parsed.findings;
            } else {
              core.setFailed(`Review JSON contract violation: 'findings' must be an array (or omitted), got ${typeof parsed.findings}`);
              return;
            }
            const dominated = new Set();
            for (let i = 0; i < findings.length; i++) {
              for (let j = 0; j < findings.length; j++) {
                if (i === j) continue;
                const a = findings[i], b = findings[j];
                if (a.file === b.file && a.title === b.title) {
                  if (getSevIdx(a.severity) < getSevIdx(b.severity)) dominated.add(j);
                }
              }
            }

            // Use Set.has() for O(1) membership; .includes() on a converted
            // array would be O(n) per call (the contract checker bans this
            // exact anti-pattern via BANNED_SUBSTRINGS).
            const dominated_filtered = findings.filter((_, i) => !dominated.has(i));
            const dominated_unacked = dominated_filtered.filter(f => !isAcknowledged(f));
            const normSev = (s) => String(s || '').toUpperCase().trim();
            const dominated_unacked_blocking = dominated_unacked.filter(f => {
              const sev = normSev(f.severity);
              return sev === 'CRITICAL' || sev === 'HIGH';
            });

            if (dominated_unacked_blocking.length > 0) {
              const summary = dominated_unacked_blocking.map(f => `[${normSev(f.severity)}] ${f.file}: ${f.title}`).join('\n');
              core.setFailed(`Blocking findings:\n${summary}`);
            }
