name: "Qwen Security Review"

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  qwen-review:
    uses: ./.github/workflows/security-review-shared.yml
    with:
      model_id: "qwen/qwen3.6-plus"
      api_base_url: "https://openrouter.ai/api/v1/chat/completions"
      model_display_name: "qwen/qwen3.6-plus (OpenRouter)"
      artifact_prefix: "qwen"
      max_tokens: 65000
      needs_json_mode: true
      uses_github_models: false
      anti_hallucination_rules: |
        [
          "## QWEN 3.6 PLUS ANTI-HALLUCINATION RULES",
          "- FABRICATION PREVENTION: This model has 26.5% fabrication rate on code reasoning.",
          "  * NEVER claim behavior without citing EXACT code that proves it.",
          "  * If unsure, say NEEDS VERIFICATION.",
          "- EDGE-CASE CAUTION: Weak on async race conditions, closure scoping, type coercion.",
          "  * Require explicit evidence from provided code for concurrency claims.",
          "- SECURITY LIMITATIONS: 43.3% success on hidden security tests.",
          "  * Focus on CONCRETE patterns, not invented hypotheticals."
        ]
    secrets:
      API_KEY: ${{ secrets.OPENROUTER_API_KEY_QWEN }}
