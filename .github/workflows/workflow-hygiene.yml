name: workflow-hygiene

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  workflow-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Determine workflow hygiene scope
        id: scope
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          workflow_shell_targets_raw="$(python3 tools/list_workflow_shell_targets.py)"
          mapfile -t workflow_shell_targets < <(printf '%s\n' "${workflow_shell_targets_raw}" | sed '/^$/d')
          tracked_regex='^\.github/workflows/.*\.ya?ml$|^tools/list_workflow_shell_targets\.py$|^tools/tests/test_list_workflow_shell_targets\.py$|^tools/check_no_remote_shell_bootstrap\.py$|^tools/tests/test_check_no_remote_shell_bootstrap\.py$|^tools/tests/test_codacy_coverage_reporter_contract\.py$|^scripts/codacy-coverage-reporter\.sh$|^scripts/local-codacy-variation-parity\.sh$'
          for target in "${workflow_shell_targets[@]}"; do
            escaped_target="$(printf '%s' "${target}" | sed 's/[][\\^$.*+?(){}|]/\\&/g')"
            tracked_regex="${tracked_regex}|^${escaped_target}$"
          done

          changed_files="$(git diff --diff-filter=ACMR --name-only "${base_sha}" "${head_sha}")"
          relevant="$(printf '%s\n' "${changed_files}" | grep -E "${tracked_regex}" || true)"

          if [[ -z "${relevant}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SKIP: no workflow-hygiene tracked files changed"
            exit 0
          fi

          workflow_files="$(printf '%s\n' "${relevant}" | grep -E '^\.github/workflows/.*\.ya?ml$' || true)"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          if [[ -n "${workflow_files}" ]]; then
            echo "run_actionlint=true" >> "$GITHUB_OUTPUT"
            {
              echo "workflow_files<<EOF"
              printf '%s\n' "${workflow_files}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "run_actionlint=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Relevant files:"
          printf '%s\n' "${relevant}"

      - name: Install actionlint
        if: steps.scope.outputs.skip != 'true'
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        run: |
          set -euo pipefail
          bin_dir="${RUNNER_TEMP}/workflow-hygiene-bin"
          archive="${RUNNER_TEMP}/actionlint.tar.gz"
          mkdir -p "${bin_dir}"
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o "${archive}"
          echo "${ACTIONLINT_SHA256}  ${archive}" | sha256sum -c -
          tar -xzf "${archive}" -C "${bin_dir}" actionlint
          echo "${bin_dir}" >> "${GITHUB_PATH}"

      - name: Install shellcheck
        if: steps.scope.outputs.skip != 'true'
        env:
          SHELLCHECK_VERSION: "0.11.0"
          SHELLCHECK_SHA256: "8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198"
        run: |
          set -euo pipefail
          bin_dir="${RUNNER_TEMP}/workflow-hygiene-bin"
          archive="${RUNNER_TEMP}/shellcheck.tar.xz"
          mkdir -p "${bin_dir}"
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" -o "${archive}"
          echo "${SHELLCHECK_SHA256}  ${archive}" | sha256sum -c -
          tar -xJf "${archive}" -C "${RUNNER_TEMP}"
          install "${RUNNER_TEMP}/shellcheck-v${SHELLCHECK_VERSION}/shellcheck" "${bin_dir}/shellcheck"
          echo "${bin_dir}" >> "${GITHUB_PATH}"

      - name: Run actionlint on changed workflows
        if: steps.scope.outputs.run_actionlint == 'true'
        env:
          ACTIONLINT_FILES: ${{ steps.scope.outputs.workflow_files }}
        run: |
          set -euo pipefail
          mapfile -t workflow_files < <(printf '%s\n' "${ACTIONLINT_FILES}" | sed '/^$/d')
          actionlint -color "${workflow_files[@]}"

      - name: Install PyYAML
        if: steps.scope.outputs.skip != 'true'
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check "PyYAML==6.0.2"

      - name: Reject remote shell bootstrap in workflows
        if: steps.scope.outputs.skip != 'true'
        run: python3 tools/check_no_remote_shell_bootstrap.py

      - name: Lint workflow-referenced CI shell targets
        if: steps.scope.outputs.skip != 'true'
        run: |
          set -euo pipefail
          targets_raw="$(python3 tools/list_workflow_shell_targets.py)"
          mapfile -t targets < <(printf '%s\n' "${targets_raw}" | sed '/^$/d')
          printf 'Shellcheck targets (%s):\n' "${#targets[@]}"
          printf '%s\n' "${targets[@]}"
          shellcheck -x "${targets[@]}"
