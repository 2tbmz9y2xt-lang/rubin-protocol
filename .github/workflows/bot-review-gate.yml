name: Bot Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  pull-requests: read

jobs:
  bot-review-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check bot reviews are acknowledged
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const MONITORED_BOTS = ['copilot[bot]'];
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const headSha = pr.head.sha;

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              }
            );

            // Keep only the latest review per monitored bot
            const latestByBot = {};
            for (const review of reviews) {
              const login = review.user?.login || '';
              if (MONITORED_BOTS.includes(login)) {
                latestByBot[login] = review;
              }
            }

            const blocking = [];
            for (const [bot, review] of Object.entries(latestByBot)) {
              // Only DISMISSED is a pass state — anything else blocks
              if (review.state === 'DISMISSED') {
                continue;
              }
              // Review must be for current head SHA — stale dismissed reviews
              // don't count as acknowledgment of new changes
              if (review.commit_id !== headSha) {
                blocking.push(
                  `  • ${bot} — no review for current commit (${headSha.slice(0, 7)})`
                );
              } else {
                blocking.push(
                  `  • ${bot} — review #${review.id} (${review.state})`
                );
              }
            }

            // Also block if a monitored bot has no review at all yet
            // (bot hasn't reviewed this PR yet — wait for it)
            for (const bot of MONITORED_BOTS) {
              if (!latestByBot[bot]) {
                // No review from this bot yet — pass (bot may not review all PRs)
                continue;
              }
            }

            if (blocking.length > 0) {
              core.setFailed(
                [
                  `${blocking.length} unacknowledged bot review(s):`,
                  ...blocking,
                  '',
                  'To unblock merge: read the review → click ⋯ → Dismiss review.'
                ].join('\n')
              );
            } else {
              core.info('All bot reviews acknowledged (dismissed) or none present.');
            }
