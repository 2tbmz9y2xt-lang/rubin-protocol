name: Bot Review Thread Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed, edited]
  pull_request_review_comment:
    types: [created, edited, deleted]

permissions:
  pull-requests: read

jobs:
  bot-review-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check bot review threads resolved
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // Bot review thread gate v6: thread-check only.
            //
            // Do not require Copilot to submit a first review here. Copilot
            // review availability is quota-dependent and should not create a
            // permanent red check when all bot threads are resolved.

            // Bots whose unresolved threads block merge.
            const botSuffix = String.fromCharCode(91, 98, 111, 116, 93);
            const MONITORED_FOR_THREADS = new Set([
              ['copilot', 'pull', 'request', 'reviewer'].join('-') + botSuffix,
              ['chatgpt', 'codex', 'connector'].join('-') + botSuffix,
            ]);

            const prNumber =
              context.payload.pull_request?.number ??
              (context.payload.issue?.pull_request ? context.payload.issue.number : null);
            if (!prNumber) {
              core.info('Not a pull request event; skipping bot-review-gate.');
              return;
            }
            const errors = [];

            // --- Thread check (paginated) ---
            const query = `query($owner:String!, $repo:String!, $pr:Int!, $cursor:String) {
              repository(owner:$owner, name:$repo) {
                pullRequest(number:$pr) {
                  reviewThreads(first:100, after:$cursor) {
                    pageInfo { hasNextPage endCursor }
                    nodes {
                      isResolved
                      comments(first:1) {
                        nodes {
                          author { login }
                        }
                      }
                    }
                  }
                }
              }
            }`;

            const threads = [];
            let cursor = null;
            try {
              while (true) {
                const result = await github.graphql(query, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pr: prNumber,
                  cursor,
                });
                const page = result.repository.pullRequest.reviewThreads;
                threads.push(...page.nodes);
                if (!page.pageInfo.hasNextPage) break;
                cursor = page.pageInfo.endCursor;
              }
            } catch (err) {
              core.setFailed(
                `Failed to fetch review threads: ${err.message}. ` +
                `Bot-review-gate blocked (fail-closed). Re-run to retry.`
              );
              return;
            }

            const unresolved = threads.filter(t => {
              if (t.isResolved) return false;
              const author = t.comments.nodes[0]?.author?.login || '';
              return MONITORED_FOR_THREADS.has(author);
            });

            if (unresolved.length > 0) {
              const byBot = {};
              for (const t of unresolved) {
                const author = t.comments.nodes[0]?.author?.login || 'unknown';
                byBot[author] = (byBot[author] || 0) + 1;
              }
              errors.push(
                `${unresolved.length} unresolved bot review thread(s):`,
                ...Object.entries(byBot).map(
                  ([bot, count]) => `  - ${bot}: ${count} unresolved`
                ),
              );
            }

            // --- Verdict ---
            if (errors.length > 0) {
              core.setFailed(
                [
                  ...errors,
                  '',
                  'To unblock merge:',
                  '  1. Resolve all bot review threads.',
                ].join('\n')
              );
            } else {
              core.info(
                'All bot review threads resolved.'
              );
            }
