name: fuzz-nightly

on:
  schedule:
    - cron: "20 3 * * *"
  workflow_dispatch:
    inputs:
      fuzz_time:
        description: "Go fuzz time per target (for example 45s, 120s)"
        required: false
        default: "45s"
      rust_fuzz_time:
        description: "Rust fuzz time per target in seconds (for example 60, 120)"
        required: false
        default: "60"

concurrency:
  group: fuzz-nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fuzz-stage2:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.25.8'
          cache: true
          cache-dependency-path: clients/go/go.mod

      - name: Run stage2 fuzz targets (timeboxed)
        env:
          FUZZ_TIME: ${{ github.event.inputs.fuzz_time || '45s' }}
          FUZZ_MINIMIZE_TIME: "5s"
        run: |
          scripts/dev-env.sh -- bash -lc 'cd "$GITHUB_WORKSPACE" && scripts/ci/run_fuzz_stage2.sh'

      - name: Upload fuzz artifacts (crashes/regressions)
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: fuzz-stage2-${{ github.run_id }}
          path: |
            .artifacts/fuzz-stage2/**
            clients/go/consensus/testdata/fuzz/**
          if-no-files-found: warn
          retention-days: 14

  fuzz-rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust nightly
        # NOTE: This MUST pin the `nightly` branch SHA, not `stable`.
        # Dependabot treats all branches as one dependency—verify the SHA
        # belongs to the nightly branch before merging Dependabot PRs.
        # Current nightly branch: 0f1b44df7e9cbb178d781a242338dfa5e243ad7f
        # Current stable branch:  631a55b12751854ce901bb631d5902ceb48146f7
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # nightly
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      # OpenSSL dev headers required to compile openssl-sys FFI crate.
      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Run Rust fuzz targets (timeboxed)
        env:
          RUST_FUZZ_TIME: ${{ github.event.inputs.rust_fuzz_time || '60' }}
        run: |
          cd clients/rust
          TARGETS=(merkle_determinism retarget_no_panic biguint_roundtrip sighash parse_tx parse_block_bytes compactsize validate_block_basic pow_check compact_shortid parse_htlc parse_vault parse_multisig fork_work block_subsidy covenant_genesis p2p_wire_message p2p_version_payload)
          STATUS=0
          for target in "${TARGETS[@]}"; do
            echo "==> fuzzing $target for ${RUST_FUZZ_TIME}s"
            if ! cargo fuzz run "$target" -- -max_total_time="${RUST_FUZZ_TIME}"; then
              STATUS=1
              echo "FAIL $target"
            else
              echo "PASS $target"
            fi
          done
          exit $STATUS

      - name: Upload Rust fuzz artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: fuzz-rust-${{ github.run_id }}
          path: clients/rust/fuzz/artifacts/
          if-no-files-found: warn
          retention-days: 14
