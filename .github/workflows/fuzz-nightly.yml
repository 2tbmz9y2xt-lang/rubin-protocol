name: fuzz-nightly

on:
  schedule:
    - cron: "20 3 * * *"
  workflow_dispatch:
    inputs:
      fuzz_time:
        description: "Go fuzz time per target (for example 45s, 120s)"
        required: false
        default: "45s"
      rust_fuzz_time:
        description: "Rust fuzz time per target in seconds (for example 60, 120)"
        required: false
        default: "60"

concurrency:
  group: fuzz-nightly
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  fuzz-stage2:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
          cache: true
          cache-dependency-path: clients/go/go.mod

      - name: Run stage2 fuzz targets (timeboxed)
        id: fuzz
        env:
          FUZZ_TIME: ${{ github.event.inputs.fuzz_time || '45s' }}
          FUZZ_MINIMIZE_TIME: "5s"
        run: |
          scripts/dev-env.sh -- bash -lc "cd \"$GITHUB_WORKSPACE\" && scripts/ci/run_fuzz_stage2.sh"

      - name: Upload fuzz artifacts (crashes/regressions)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fuzz-stage2-${{ github.run_id }}
          path: |
            .artifacts/fuzz-stage2/**
            clients/go/consensus/testdata/fuzz/**
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14

      - name: Signal red run via pinned issue
        if: ${{ failure() && steps.fuzz.conclusion == 'failure' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          # Idempotent label create; tolerate "already exists". The
          # label-filtered lookup then returns only the single pinned issue,
          # so it can never be truncated out of a newest-N window.
          gh label create fuzz-nightly-signal --repo "$GITHUB_REPOSITORY" --color BFD4F2 \
            --description "Pinned fuzz-nightly signal issue" 2>/dev/null || true
          issue_line="$(gh issue list --repo "$GITHUB_REPOSITORY" --state all --label fuzz-nightly-signal \
            --json number,title,state \
            --jq '[.[] | select(.title == "fuzz-nightly red")] | sort_by(.number) | first // empty | "\(.number) \(.state)"')"
          if [ -z "$issue_line" ]; then
            issue_number="$(gh issue create --repo "$GITHUB_REPOSITORY" --title "fuzz-nightly red" \
              --label fuzz-nightly-signal \
              --body "Pinned signal for red fuzz-nightly runs (a target failed twice). Synced to Linear Triage. Open the run to see which target and why; close after triage." \
              | sed 's|.*/||')"
          else
            issue_number="${issue_line%% *}"
            if [ "${issue_line##* }" = "CLOSED" ]; then
              gh issue reopen "$issue_number" --repo "$GITHUB_REPOSITORY"
            fi
          fi
          gh issue comment "$issue_number" --repo "$GITHUB_REPOSITORY" \
            --body "Red fuzz-nightly run $(date -u +%Y-%m-%dT%H:%M:%SZ). Run: ${run_url}"

  fuzz-rust:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust nightly
        # NOTE: This MUST pin the `nightly` branch SHA, not `stable`.
        # Dependabot treats all branches as one dependency—verify the SHA
        # belongs to the nightly branch before merging Dependabot PRs.
        # Current nightly branch: 0f1b44df7e9cbb178d781a242338dfa5e243ad7f
        # Current stable branch:  631a55b12751854ce901bb631d5902ceb48146f7
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # nightly
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      # OpenSSL dev headers required to compile openssl-sys FFI crate.
      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Run Rust fuzz targets (timeboxed)
        env:
          RUST_FUZZ_TIME: ${{ github.event.inputs.rust_fuzz_time || '60' }}
        run: |
          quote_env_value() {
            local value="$1"
            printf "'"
            printf '%s' "$value" | sed "s/'/'\"'\"'/g"
            printf "'"
          }

          write_env_field() {
            local key="$1"
            local value="$2"
            printf '%s=%s\n' "$key" "$(quote_env_value "$value")"
          }

          RUST_ARTIFACTS_DIR="$GITHUB_WORKSPACE/.artifacts/fuzz-rust"
          mkdir -p "$RUST_ARTIFACTS_DIR"
          cd clients/rust
          TARGETS=(merkle_determinism retarget_no_panic biguint_roundtrip sighash parse_tx parse_block_bytes compactsize validate_block_basic pow_check compact_shortid parse_htlc parse_vault parse_multisig fork_work block_subsidy covenant_genesis p2p_wire_message p2p_version_payload sig_verify_openssl sig_cache_structural connect_block_inmem da_chunk_hash_verify tx_dep_graph da_payload_commit_verify tx_relay_announce tx_relay_receive)
          {
            write_env_field "commit_sha" "${GITHUB_SHA}"
            write_env_field "workflow_run_id" "${GITHUB_RUN_ID}"
            write_env_field "workflow_run_attempt" "${GITHUB_RUN_ATTEMPT}"
            write_env_field "rust_fuzz_time" "${RUST_FUZZ_TIME}"
            write_env_field "artifact_dir" ".artifacts/fuzz-rust"
            write_env_field "mutation_policy" "manual-only; ci does not commit, push, regenerate tracked fixtures, or open issues"
            write_env_field "promotion_docs" "conformance/README.md#fuzz-crash-promotion-manual-only"
          } > "$RUST_ARTIFACTS_DIR/run-metadata.env"
          STATUS=0
          for target in "${TARGETS[@]}"; do
            {
              write_env_field "commit_sha" "${GITHUB_SHA}"
              write_env_field "target" "${target}"
              write_env_field "artifacts_path" "clients/rust/fuzz/artifacts/${target}"
              write_env_field "corpus_path" "clients/rust/fuzz/corpus/${target}"
              write_env_field "command" "cd clients/rust && cargo fuzz run \"${target}\" -- -max_total_time=\"${RUST_FUZZ_TIME}\""
            } > "$RUST_ARTIFACTS_DIR/${target}.metadata.env"
            echo "==> fuzzing $target for ${RUST_FUZZ_TIME}s"
            if ! cargo fuzz run "$target" -- -max_total_time="${RUST_FUZZ_TIME}"; then
              STATUS=1
              echo "FAIL $target"
            else
              echo "PASS $target"
            fi
          done
          exit $STATUS

      - name: Upload Rust fuzz artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fuzz-rust-${{ github.run_id }}
          path: |
            .artifacts/fuzz-rust/**
            clients/rust/fuzz/artifacts/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14
