name: "DeepSeek Security Review"

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  deepseek-review:
    uses: ./.github/workflows/security-review-shared.yml
    with:
      model_id: "deepseek/DeepSeek-R1-0528"
      api_base_url: "https://models.github.ai/inference/chat/completions"
      model_display_name: "deepseek/DeepSeek-R1-0528"
      artifact_prefix: "deepseek"
      max_tokens: 0
      needs_json_mode: false
      uses_github_models: true
      anti_hallucination_rules: "[]"
    # No `secrets: inherit` — this caller authenticates GitHub Models with
    # GITHUB_TOKEN (uses_github_models: true), so passing repository secrets
    # to the called workflow would unnecessarily widen the blast radius.
    # The shared workflow declares API_KEY as `required: false`.
