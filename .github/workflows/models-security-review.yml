name: "Orchestrated Multi-Model Security Review (GitHub Models)"

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**/*.go'
      - '**/*.rs'
      - '**/*.lean'

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  get-diff:
    runs-on: ubuntu-latest
    outputs:
      skip: "${{ steps.diff.outputs.skip }}"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }})
          if [ -z "$DIFF" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "$DIFF" > pr-diff.txt
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload diff artifact
        if: steps.diff.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pr-diff
          path: pr-diff.txt
          retention-days: 1

  security-review:
    needs: get-diff
    if: needs.get-diff.outputs.skip != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model:
          - id: openai/gpt-4.1
            name: gpt-4.1
            fallback: deepseek/DeepSeek-V3-0324
          - id: deepseek/DeepSeek-V3-0324
            name: deepseek-v3
            fallback: meta/Llama-4-Maverick-17B-128E-Instruct-FP8
          - id: meta/Llama-4-Maverick-17B-128E-Instruct-FP8
            name: llama-4-maverick
            fallback: openai/gpt-4.1-mini
    steps:
      - uses: actions/checkout@v4
      - name: Download diff artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-diff
      - name: Run security review with fallback
        id: review
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('pr-diff.txt', 'utf8').slice(0, 12000);

            const systemPrompt = `You are the main protocol security reviewer for the RUBIN protocol.

            Context:
            - Bitcoin-like UTXO chain with dual reference clients (Go + Rust) and Lean4 formal verification
            - Cryptography: ML-DSA-87 (native signature scheme). SLH-DSA is NOT natively used, only referenced externally or via non-native/extensible paths
            - Covenant-typed covenant system (P2PK, HTLC, anchor, DA-commit, CORE_EXT, vault, multisig)
            - Soft-fork deployment mechanism for protocol upgrades
            - Canonical chain: RUBIN_L1_CANONICAL.md -> fixtures -> Go client -> Rust parity client -> conformance tests

            Review the diff for security issues, ordered by severity:

            CRITICAL:
            - double-spend
            - inflation
            - signature bypass
            - fork-choice errors
            - reorg safety failures

            HIGH:
            - nonce reuse
            - weak entropy
            - PQ parameter misuse
            - hash collision paths

            MEDIUM:
            - integer overflow or underflow
            - slice bounds errors
            - unchecked casts
            - panic paths in consensus or validation

            LOW:
            - incorrect state transitions
            - disconnect or reconnect correctness
            - undo record integrity

            INFO:
            - behavioral divergence that could cause chain splits
            - spec/code/fixture drift that changes accept or reject behavior

            PERF:
            - unbounded allocations
            - CPU-intensive hot paths
            - disk exhaustion paths

            STYLE:
            - constant type confusion
            - vault bypass preconditions
            - timelock circumvention via ambiguous logic

            Rules:
            - Review only what is visible in the provided diff bundle.
            - Do not invent files, lines, or behavior not evidenced by the diff.
            - If there are no findings, return an empty findings array and explain why in summary.
            - Prefer the most relevant changed line in the diff for each finding.
            - Output valid JSON only in this exact shape:

            {"model":"<name>","findings":[{"severity":"CRITICAL|HIGH|MEDIUM|LOW|INFO|PERF|STYLE","file":"<path>","line":<n>,"title":"<short>","details":"<explanation>","suggestion":"<fix>"}],"summary":"<overall>"}`;

            const models = [
              '${{ matrix.model.id }}',
              '${{ matrix.model.fallback }}'
            ];

            let result = null;
            let usedModel = null;

            for (const modelId of models) {
              try {
                core.info(`Trying model: ${modelId}`);
                const response = await fetch(
                  'https://models.github.ai/inference/chat/completions',
                  {
                    method: 'POST',
                    headers: {
                      'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      model: modelId,
                      messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: `Review this PR diff:\n\n${diff}` }
                      ],
                      temperature: 0.2
                    })
                  }
                );
                if (!response.ok) {
                  core.warning(`Model ${modelId} returned ${response.status}: ${response.statusText}`);
                  continue;
                }
                const data = await response.json();
                result = data.choices[0].message.content;
                usedModel = modelId;
                break;
              } catch (err) {
                core.warning(`Model ${modelId} failed: ${err.message}`);
              }
            }

            if (!result) {
              core.setFailed('All models unavailable');
              return;
            }

            core.info(`Used model: ${usedModel}`);
                          // Strip markdown code fences that models sometimes wrap around JSON
              result = result.replace(/^\s*```(?:json)?\s*\n?/, '').replace(/\n?\s*```\s*$/, '').trim();
            core.setOutput('review', result);
            core.setOutput('used_model', usedModel);
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post review comment
        if: steps.review.outputs.review
        uses: actions/github-script@v7
        with:
          script: |
            const review = ${{ toJSON(steps.review.outputs.review) }};
            const model = '${{ steps.review.outputs.used_model }}';
            const label = '${{ matrix.model.name }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Security Review: ${label}\n_Model: ${model}_\n\n\`\`\`json\n${review}\n\`\`\``
            });

  resolve:
    needs: security-review
    if: always() && needs.security-review.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Collect model reviews and resolve disputes
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const reviews = comments
              .filter(c => c.body.startsWith('### Security Review:'))
              .map(c => {
                const jsonMatch = c.body.match(/```json\n([\s\S]*?)\n```/);
                return jsonMatch ? jsonMatch[1] : null;
              })
              .filter(Boolean);

            if (reviews.length === 0) {
              core.setFailed('No model reviews found');
              return;
            }

            core.info(`Found ${reviews.length} model reviews`);

            const allFindings = [];
            for (const r of reviews) {
              try {
                const parsed = JSON.parse(r);
                if (parsed.findings) {
                  for (const f of parsed.findings) {
                    f._model = parsed.model;
                    allFindings.push(f);
                  }
                }
              } catch (e) {
                core.warning(`Failed to parse review JSON: ${e.message}`);
              }
            }

            const severityOrder = ['CRITICAL','HIGH','MEDIUM','LOW','INFO','PERF','STYLE'];
            allFindings.sort((a, b) => severityOrder.indexOf(a.severity) - severityOrder.indexOf(b.severity));

            const grouped = {};
            for (const f of allFindings) {
              const key = `${f.file}::${f.title}`;
              if (!grouped[key]) grouped[key] = [];
              grouped[key].push(f);
            }

            const agreed = [];
            const disputed = [];
            const unique = [];

            for (const [key, findings] of Object.entries(grouped)) {
              if (findings.length >= 2) {
                const sevs = new Set(findings.map(f => f.severity));
                if (sevs.size === 1) {
                  agreed.push({ ...findings[0], confirmedBy: findings.map(f => f._model) });
                } else {
                  disputed.push({ key, findings });
                }
              } else {
                unique.push(findings[0]);
              }
            }

            const hasCritical = agreed.some(f => f.severity === 'CRITICAL');
            const hasDisputedCritical = disputed.some(d =>
              d.findings.some(f => f.severity === 'CRITICAL' || f.severity === 'HIGH')
            );

            let verdict = 'APPROVE';
            let reason = '';

            if (hasCritical) {
              verdict = 'BLOCK';
              reason = `${agreed.filter(f => f.severity === 'CRITICAL').length} confirmed CRITICAL finding(s)`;
            } else if (hasDisputedCritical) {
              verdict = 'NEEDS_HUMAN_REVIEW';
              reason = 'Disputed CRITICAL/HIGH findings between models';
            }

            let body = `### Security Review Resolution\n\n`;
            body += `**Verdict: ${verdict}**`;
            if (reason) body += ` - ${reason}`;
            body += `\n\n`;
            body += `| Metric | Count |\n|--------|-------|\n`;
            body += `| Models responded | ${reviews.length} |\n`;
            body += `| Agreed findings | ${agreed.length} |\n`;
            body += `| Disputed findings | ${disputed.length} |\n`;
            body += `| Unique (single model) | ${unique.length} |\n\n`;

            if (agreed.length > 0) {
              body += `#### Confirmed Findings\n`;
              for (const f of agreed) {
                body += `- **${f.severity}** \`${f.file}\`: ${f.title} _(confirmed by ${f.confirmedBy.join(', ')})_\n`;
              }
              body += `\n`;
            }

            if (disputed.length > 0) {
              body += `#### Disputed Findings (need human review)\n`;
              for (const d of disputed) {
                body += `- \`${d.key}\`: `;
                body += d.findings.map(f => `${f._model}=${f.severity}`).join(' vs ');
                body += `\n`;
              }
              body += `\n`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            if (verdict === 'BLOCK') {
              core.setFailed(`Merge blocked: ${reason}`);
            } else {
              core.info(`Resolution: ${verdict}`);
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
