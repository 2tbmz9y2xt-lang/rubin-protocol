name: "DeepSeek Security Review"

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  get-diff:
    runs-on: ubuntu-latest
    outputs:
      skip: "${{ steps.diff.outputs.skip }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Get PR diff
        id: diff
        run: |
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --name-only)
          RELEVANT=$(printf '%s\n' "$FILES" | grep -E '(\.go$|\.rs$|\.lean$)' || true)
          if [ -z "$RELEVANT" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "SKIP: no changed Go/Rust/Lean files for hostile code review"
            exit 0
          fi
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }})
          if [ -z "$DIFF" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "$DIFF" > pr-diff.txt
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload diff artifact
        if: steps.diff.outputs.skip != 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: pr-diff
          path: pr-diff.txt
          retention-days: 1

  security-review:
    needs: get-diff
    if: needs.get-diff.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Download diff artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v4
        with:
          name: pr-diff
      - name: Install jsonrepair
        run: npm install jsonrepair@3.12.0

      - name: Run security review
        id: review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');
            const { jsonrepair } = require('./node_modules/jsonrepair');
            const diff = fs.readFileSync('pr-diff.txt', 'utf8').slice(0, 128000);

            // Fetch previous security review findings to avoid re-reporting.
            // P1 fix: only trust comments from the bot account (github-actions[bot])
            // that actually runs this workflow — reject arbitrary contributor comments.
            // P2 fix: paginate through ALL comments to reliably find the latest reviews.
            const TRUSTED_AUTHORS = new Set(['github-actions[bot]']);
            let previousFindings = '';
            try {
              const allComments = [];
              for await (const response of github.paginate.iterator(
                github.rest.issues.listComments, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  per_page: 100,
                }
              )) {
                allComments.push(...response.data);
              }
              const reviewComments = allComments
                .filter(c => c.body
                  && TRUSTED_AUTHORS.has(c.user?.login ?? '')
                  && c.body.includes('Security Review:')
                  && c.body.includes('deepseek'))
                .slice(-3);  // last 3 trusted reviews
              if (reviewComments.length > 0) {
                const titles = [];
                for (const c of reviewComments) {
                  const jsonMatch = c.body.match(/```json\n([\s\S]*?)```/);
                  if (jsonMatch) {
                    try {
                      const parsed = JSON.parse(jsonMatch[1]);
                      for (const f of (parsed.findings || [])) {
                        // Sanitize: strip newlines, limit length, allow only printable ASCII
                        const sev = String(f.severity || '').replace(/[^A-Z]/g, '').slice(0, 10);
                        const title = String(f.title || '')
                          .replace(/[\r\n]+/g, ' ')
                          .replace(/[^\x20-\x7E]/g, '')
                          .slice(0, 120);
                        const file = String(f.file || '')
                          .replace(/[^\x20-\x7E]/g, '')
                          .slice(0, 200);
                        if (sev && title) {
                          titles.push(`[${sev}] ${title}` + (file ? ` (in ${file})` : ''));
                        }
                      }
                    } catch {}
                  }
                }
                if (titles.length > 0) {
                  previousFindings = '\n\nPREVIOUSLY REPORTED (do NOT re-report these — they are already tracked):\n' +
                    [...new Set(titles)].join('\n');
                }
              }
            } catch (err) {
              core.warning(`Could not fetch previous reviews: ${err.message}`);
            }

            // Read full changed files for context (same pattern as rubin-formal)
            const repoRoot = process.cwd();
            const repoRootReal = fs.realpathSync(repoRoot);
            const baseSha = '${{ github.event.pull_request.base.sha }}';
            const headSha = '${{ github.event.pull_request.head.sha }}';
            const changedFiles = execSync(
              `git diff --diff-filter=ACMR --name-only ${baseSha} ${headSha} -- '*.go' '*.rs' '*.lean'`,
              { maxBuffer: 20 * 1024 * 1024 }
            ).toString().split('\n').map(s => s.trim()).filter(Boolean);

            const readChangedFile = (file) => {
              const fullPath = path.resolve(repoRoot, file);
              const rel = path.relative(repoRoot, fullPath);
              if (rel.startsWith('..') || path.isAbsolute(rel)) return null;
              try {
                const st = fs.lstatSync(fullPath);
                if (st.isSymbolicLink() || !st.isFile()) return null;
                const realPath = fs.realpathSync(fullPath);
                if (!(realPath === repoRootReal || realPath.startsWith(`${repoRootReal}${path.sep}`))) return null;
                return fs.readFileSync(realPath, 'utf8');
              } catch { return null; }
            };

            // Streaming budget: add files one-by-one until TOTAL_FILE_BUDGET is reached.
            // Each entry's real overhead (header + separator) is computed from actual path length,
            // preventing silent truncation of tail files by the final .slice() guard.
            const TOTAL_FILE_BUDGET = 100000;
            const SEPARATOR = '\n\n---\n\n';
            const PER_FILE_CAP = 30000; // max chars per individual file
            const entries = [];
            let usedBytes = 0;
            for (const file of changedFiles) {
              const content = readChangedFile(file);
              if (!content) continue;
              const header = `FILE: ${file}\n`;
              // Reserve space: header + separator (except first entry) + at least 200 chars of content
              const frameSize = header.length + (entries.length > 0 ? SEPARATOR.length : 0);
              if (usedBytes + frameSize + 200 > TOTAL_FILE_BUDGET) continue; // skip this file, try shorter ones
              const remainingBudget = TOTAL_FILE_BUDGET - usedBytes - frameSize;
              const contentBudget = Math.min(PER_FILE_CAP, remainingBudget);
              const entry = header + content.slice(0, contentBudget);
              entries.push(entry);
              usedBytes += entry.length + (entries.length > 1 ? SEPARATOR.length : 0);
            }
            const changedFilePayload = entries.join(SEPARATOR);

            // ── Dependency context extraction ──────────────────────────
            // For each changed Rust file, parse `use crate::` imports,
            // resolve source modules, and extract doc-comments + public
            // signatures.  This gives the model cross-module invariant
            // awareness and reduces false-positive findings.
            const DEP_BUDGET = 20000;          // max chars for this section
            const depEntries = [];
            let depUsed = 0;

            for (const file of changedFiles) {
              if (!file.endsWith('.rs')) continue;
              const content = readChangedFile(file);
              if (!content) continue;

              // Locate crate src/ root from the file path
              const srcMatch = file.match(/^(.*\/src)\//);
              if (!srcMatch) continue;
              const crateRoot = srcMatch[1];

              // Join multi-line `use crate::` statements into single lines
              const fileLines = content.split('\n');
              const useStatements = [];
              let inUse = false, useAccum = '';
              for (const ln of fileLines) {
                if (/^\s*use\s+crate::/.test(ln) && !ln.includes(';')) {
                  inUse = true; useAccum = ln;
                } else if (inUse) {
                  useAccum += ' ' + ln.trim();
                  if (ln.includes(';')) { useStatements.push(useAccum); inUse = false; useAccum = ''; }
                } else if (/^\s*use\s+crate::/.test(ln) && ln.includes(';')) {
                  useStatements.push(ln);
                }
              }

              // Parse module paths and imported symbols
              const modImports = new Map(); // modulePath -> Set<symbol>
              for (const stmt of useStatements) {
                // use crate::foo::bar::{A, B};  OR  use crate::foo::bar::Baz;
                const m = stmt.match(/use\s+crate::([^{;]+?)(?:::(\{[^}]+\})|::(\w+))\s*;/);
                if (!m) continue;
                const modPath = m[1].trim();
                const existing = modImports.get(modPath) || new Set();
                if (m[2]) {
                  m[2].replace(/[{}]/g, '').split(',').map(s => s.trim()).filter(Boolean)
                    .forEach(s => existing.add(s));
                } else if (m[3]) {
                  existing.add(m[3]);
                }
                modImports.set(modPath, existing);
              }

              // Resolve each module path to a source file
              for (const [modPath, symbols] of modImports) {
                const parts = modPath.split('::');
                let modFile = null;
                const candidates = [
                  path.join(repoRoot, crateRoot, ...parts) + '.rs',
                  path.join(repoRoot, crateRoot, ...parts, 'mod.rs'),
                ];
                // Last segment might be a symbol inside the parent module
                if (parts.length > 1) {
                  candidates.push(
                    path.join(repoRoot, crateRoot, ...parts.slice(0, -1)) + '.rs'
                  );
                }
                for (const cand of candidates) {
                  try { if (fs.statSync(cand).isFile()) { modFile = cand; break; } } catch {}
                }
                if (!modFile) continue;
                const modRel = path.relative(repoRoot, modFile);
                // Skip files already in changedFilePayload
                if (changedFiles.includes(modRel)) continue;

                let modContent;
                try { modContent = fs.readFileSync(modFile, 'utf8'); } catch { continue; }

                for (const sym of symbols) {
                  if (depUsed >= DEP_BUDGET) break;
                  // Find /// doc-comments + pub/pub(crate) fn/struct/enum/type/const/trait signature
                  // Also skip #[...] attribute lines between doc-comments and signature
                  const sigRe = new RegExp(
                    '((?:^[ \\t]*///[^\\n]*\\n)*)' +
                    '(?:^[ \\t]*#\\[[^\\]]*\\]\\s*\\n)*' +
                    '^[ \\t]*pub(?:\\([^)]*\\))?\\s+(?:fn|struct|enum|const|type|trait)\\s+' +
                    sym + '\\b[^\\n]*',
                    'gm'
                  );
                  const hit = sigRe.exec(modContent);
                  if (!hit) continue;
                  const docLines = (hit[1] || '').split('\n')
                    .filter(l => l.trim().startsWith('///'))
                    .map(l => l.trim()).join('\n');
                  const sigLine = hit[0].replace(hit[1] || '', '').split('\n')[0].trim();
                  if (!sigLine) continue;
                  const entry = `### ${sym} (${modRel})\n${docLines ? docLines + '\n' : ''}${sigLine}\n`;
                  if (depUsed + entry.length > DEP_BUDGET) continue;
                  depEntries.push(entry);
                  depUsed += entry.length;
                }
              }
            }

            const dependencyContext = depEntries.length > 0
              ? '\n\n---\nDEPENDENCY CONTRACTS (doc-comments and signatures of functions imported by changed files — use these to verify cross-module invariants before reporting findings):\n\n' + depEntries.join('\n')
              : '';

            // ── Cross-language parity context ────────────────────────────
            // When consensus-critical Go files change, inject the Rust
            // counterpart (and vice versa) so the model can verify parity
            // claims with actual evidence instead of hallucinating.
            const PARITY_BUDGET = 30000;
            const parityMap = [
              // Go → Rust parity pairs (consensus-critical files)
              ['clients/go/consensus/wire_read.go',   'clients/rust/crates/rubin-consensus/src/wire_read.rs'],
              ['clients/go/consensus/tx_helpers.go',   'clients/rust/crates/rubin-consensus/src/tx_helpers.rs'],
              ['clients/go/consensus/transaction.go',  'clients/rust/crates/rubin-consensus/src/transaction.rs'],
              ['clients/go/consensus/block.go',        'clients/rust/crates/rubin-consensus/src/block.rs'],
              ['clients/go/consensus/script_engine.go','clients/rust/crates/rubin-consensus/src/script_engine.rs'],
              ['clients/go/consensus/constants.go',    'clients/rust/crates/rubin-consensus/src/constants.rs'],
              ['clients/go/consensus/covenant.go',     'clients/rust/crates/rubin-consensus/src/covenant.rs'],
            ];
            const parityEntries = [];
            let parityUsed = 0;
            for (const file of changedFiles) {
              if (parityUsed >= PARITY_BUDGET) break;
              // Find the parity counterpart (either direction)
              for (const [goFile, rsFile] of parityMap) {
                let counterpart = null;
                if (file === goFile && !changedFiles.includes(rsFile)) counterpart = rsFile;
                else if (file === rsFile && !changedFiles.includes(goFile)) counterpart = goFile;
                if (!counterpart) continue;
                const content = readChangedFile(counterpart);
                if (!content) continue;
                const header = `PARITY FILE: ${counterpart} (counterpart of changed ${file})\n`;
                const cap = Math.min(PARITY_BUDGET - parityUsed - header.length, PER_FILE_CAP);
                if (cap < 200) continue;
                const entry = header + content.slice(0, cap);
                parityEntries.push(entry);
                parityUsed += entry.length;
              }
            }
            const parityContext = parityEntries.length > 0
              ? '\n\n---\nPARITY CONTEXT (counterpart files from the other client — use to verify cross-client consistency BEFORE reporting divergence):\n\n' + parityEntries.join(SEPARATOR)
              : '';

            const systemPrompt = [
              'You are a HOSTILE protocol security auditor for the RUBIN blockchain protocol.',
              'Your job is NOT to help the author — it is to BREAK their code and find every exploitable flaw.',
              '',
              'PROTOCOL CONTEXT:',
              '- Bitcoin-like UTXO chain with dual reference clients (Go + Rust) and Lean4 formal verification',
              '- Cryptography: ML-DSA-87 (FIPS 204) as native signature scheme, post-quantum',
              '- Covenant-typed system: P2PK, HTLC, anchor, DA-commit, CORE_EXT, vault, multisig',
              '- Soft-fork deployment mechanism for protocol upgrades',
              '- Canonical chain: RUBIN_L1_CANONICAL.md -> fixtures -> Go -> Rust -> conformance tests',
              '- Consensus-critical code: ANY divergence between Go and Rust = chain split = CRITICAL',
              '',
              'SEVERITY CLASSIFICATION:',
              'CRITICAL: double-spend, inflation bug, signature bypass, fork-choice error, reorg safety failure,',
              '  consensus divergence between Go/Rust clients, covenant type confusion allowing unauthorized spend',
              'HIGH: nonce reuse, weak entropy, PQ parameter misuse (ML-DSA wrong security level),',
              '  hash collision paths, missing signature validation on any code path',
              'MEDIUM: integer overflow/underflow, slice bounds, unchecked casts, panic in consensus path,',
              '  missing error propagation that silently accepts invalid state',
              'LOW: incorrect state transitions, disconnect/reconnect bugs, undo record integrity,',
              '  non-canonical serialization that could cause hash mismatch',
              'INFO: spec/code/fixture drift, behavioral divergence risk, missing test coverage for edge cases',
              'PERF: unbounded allocations, O(n^2) in hot paths, disk exhaustion, memory exhaustion under load',
              '',
              'HOSTILE REVIEW RULES:',
              '- Assume every change is guilty until proven safe.',
              '- Check EVERY arithmetic operation for overflow/underflow.',
              '- Check EVERY slice/array access for bounds.',
              '- Check EVERY type cast for truncation or sign errors.',
              '- Check EVERY error path: does it fail-closed or fail-open?',
              '- If Go code changed: would the same logic in Rust produce identical results? Flag if uncertain.',
              '- If Rust code changed: would the same logic in Go produce identical results? Flag if uncertain.',
              '- CROSS-CLIENT EVIDENCE RULE (MANDATORY): BEFORE reporting consensus divergence between Go and Rust,',
              '  you MUST cite concrete evidence from BOTH clients\' code. If you only see one client\'s code in the',
              '  diff/context, check the PARITY CONTEXT section below. If you have NO evidence from the other client,',
              '  do NOT report divergence — add it to unreviewed_sections instead.',
              '- If cryptographic code changed: verify parameter sizes, check for timing side-channels.',
              '- CRYPTO STANDARD ANTI-HALLUCINATION (MANDATORY): NEVER claim a cryptographic standard (FIPS, NIST,',
              '  RFC) allows, requires, or forbids something based on your training knowledge. Crypto standards are',
              '  complex — only report findings about standard compliance if the SPECIFIC requirement is visible in',
              '  the code diff or context. ML-DSA-87 (FIPS 204) signatures are EXACTLY 4627 bytes (fixed-length,',
              '  lattice bitpacking). Do NOT assume variable-length encoding unless code explicitly shows it.',
              '- NEVER say "looks good" or "no issues found" if you have not verified every line.',
              '- If the diff is too large to fully verify, say so explicitly and flag unreviewed sections.',
              '- DEDUPLICATION (MANDATORY): Check the PREVIOUSLY REPORTED section below the diff.',
              '  If a finding describes the same underlying issue as one already reported — even with',
              '  different wording or title — SKIP IT. Two findings about the same root cause in the',
              '  same file are duplicates regardless of how they are phrased.',
              '  Only report genuinely NEW issues not covered by previous reviews.',
              '- ANTI-HALLUCINATION: If the diff is truncated or you cannot see a file/function mentioned elsewhere',
              '  in the diff — do NOT claim it is missing. Add it to unreviewed_sections and set verdict to WARN.',
              '- NEVER report "function not defined" or "file missing" unless you have verified the COMPLETE diff.',
              '  If diff is truncated, assume unseen code exists and flag as unreviewed, not missing.',
              '- You will receive BOTH the diff AND the full content of changed files. Use the full file content',
              '  to verify function definitions, imports, and call sites before claiming anything is missing.',
              '- CROSS-MODULE INVARIANTS: You may receive DEPENDENCY CONTRACTS — doc-comments and signatures',
              '  of functions/types imported by changed files. These document ordering guarantees, filtering',
              '  guarantees, and return value bounds. BEFORE reporting a finding about cross-module behavior,',
              '  check if an imported function\'s doc-comment documents the guarantee in question. If it does,',
              '  do NOT report the finding unless you have explicit counter-evidence from the code.',
              '- CODE CITATION RULE (MANDATORY): NEVER claim code uses a specific API, ordering, parameter,',
              '  type, or calling convention unless you can cite the EXACT line from the diff or full file',
              '  context provided. If your finding states "code uses X" but X does not appear in the provided',
              '  code, your finding is a hallucination — discard it. This applies to memory orderings, function',
              '  signatures, error handling patterns, and all other concrete code properties.',
              '',
              'OUTPUT FORMAT — strict JSON only, no markdown, no commentary:',
              '{',
              '  "model": "deepseek/DeepSeek-R1-0528",',
              '  "verdict": "BLOCK" | "WARN" | "PASS",',
              '  "findings": [{',
              '    "severity": "CRITICAL|HIGH|MEDIUM|LOW|INFO|PERF",',
              '    "file": "path/to/file",',
              '    "line": 0,',
              '    "title": "short title",',
              '    "details": "what is wrong and why it is exploitable",',
              '    "suggestion": "concrete fix"',
              '  }],',
              '  "unreviewed_sections": ["list files/ranges not fully checked"],',
              '  "summary": "one paragraph hostile summary"',
              '}',
              '',
              'VERDICT RULES:',
              '- BLOCK if any CRITICAL or HIGH finding exists.',
              '- WARN if any MEDIUM finding exists.',
              '- PASS only if all findings are LOW/INFO/PERF or no findings.',
              '- If diff is too large to fully review, verdict MUST be WARN with explanation.',
            ].join('\n');

            const modelId = 'deepseek/DeepSeek-R1-0528';
            let rawContent = '';
            let result = null;

            try {
              core.info(`Trying model: ${modelId}`);
              const response = await fetch(
                'https://models.github.ai/inference/chat/completions',
                {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    model: modelId,
                    messages: [
                      { role: 'system', content: systemPrompt },
                      { role: 'user', content: `Review this PR diff for security vulnerabilities. Be hostile — assume every change is a potential exploit vector.\n\nDIFF:\n${diff}${changedFilePayload ? `\n\n---\nFULL CHANGED FILES (use to verify definitions before claiming anything missing):\n${changedFilePayload}` : ''}${dependencyContext}${parityContext}${previousFindings}` }
                    ],
                    temperature: 0.6,
                    top_p: 0.95
                  })
                }
              );

              if (!response.ok) {
                const body = await response.text();
                core.setFailed(`Security review fail-closed: model ${modelId} returned ${response.status}: ${body.slice(0, 200)}`);
                return;
              }

              const data = await response.json();
              if (!data.choices || !data.choices[0] || !data.choices[0].message) {
                core.setFailed(`Security review fail-closed: model ${modelId} returned unexpected structure: ${JSON.stringify(data).slice(0, 200)}`);
                return;
              }
              rawContent = data.choices[0].message.content;
              result = rawContent;
            } catch (err) {
              core.setFailed(`Security review fail-closed: model ${modelId} error: ${err.message}`);
              return;
            }

            // Strip R1 <think> reasoning blocks
            result = result.replace(/<think>[\s\S]*?<\/think>/g, '').trim();

            // Strip markdown fences if present: find first '{' and last '}'
            result = result.replace(/^[\s\S]*?(?=\{)/, '').replace(/\}(?![\s\S]*\})[\s\S]*$/, '}').trim();

            // Try parse, fallback to jsonrepair
            try {
              JSON.parse(result);
            } catch (e) {
              core.warning(`Model returned malformed JSON: ${e.message}. Attempting jsonrepair...`);
              try {
                result = jsonrepair(result);
                JSON.parse(result); // validate repair worked
              } catch (e2) {
                fs.writeFileSync('raw-review-output.txt', rawContent);
                core.setFailed(`Security review fail-closed: jsonrepair also failed: ${e2.message}`);
                return;
              }
            }

            core.setOutput('review', result);
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload raw review output
        if: always() && hashFiles('raw-review-output.txt') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: raw-review-output
          path: raw-review-output.txt
          retention-days: 3

      - name: Post review comment
        if: steps.review.outputs.review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v7
        with:
          script: |
            const review = ${{ toJSON(steps.review.outputs.review) }};
            if (!review) return;
            let parsed;
            try { parsed = JSON.parse(review); } catch(e) { parsed = null; }
            const verdict = parsed && parsed.verdict ? parsed.verdict : 'UNKNOWN';
            const emoji = verdict === 'PASS' ? '\u2705' : verdict === 'WARN' ? '\u26a0\ufe0f' : '\ud83d\uded1';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### ${emoji} Security Review: ${verdict}\n_Model: deepseek/DeepSeek-R1-0528_\n\n\`\`\`json\n${review}\n\`\`\``
            });

      - name: Block on critical/high findings (with acknowledged-list filter)
        if: steps.review.outputs.review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v7
        with:
          script: |
            const fs = require('fs');
            const raw = ${{ toJSON(steps.review.outputs.review) }};
            if (!raw) return;
            let parsed;
            try {
              parsed = JSON.parse(raw);
            } catch (e) {
              core.setFailed(`Security review fail-closed: unparseable review JSON: ${e.message}`);
              return;
            }

            // Load acknowledged findings list from BASE ref (not PR workspace).
            // Security: prevents contributors from adding broad patterns in the
            // same PR to bypass the CRITICAL/HIGH merge gate.
            const { execSync } = require('child_process');
            const baseSha = '${{ github.event.pull_request.base.sha }}';
            let acknowledged = [];
            try {
              const ackRaw = execSync(
                `git show ${baseSha}:.github/security-acknowledged.json`,
                { encoding: 'utf8', timeout: 5000 }
              );
              const ackData = JSON.parse(ackRaw);
              acknowledged = ackData.acknowledged || [];
              core.info(`Loaded ${acknowledged.length} acknowledged pattern(s) from base ref ${baseSha.slice(0, 8)}`);
            } catch (e) {
              // File doesn't exist on base branch yet, or parse error — no filter
              core.info(`No acknowledged list on base ref — all findings are novel`);
            }

            // Check if a finding matches any acknowledged pattern.
            // Fail-closed: entries with empty/missing title_pattern are skipped
            // to prevent a malformed entry from suppressing all findings.
            function isAcknowledged(finding) {
              const title = (finding.title || '').toLowerCase();
              const file = (finding.file || '').toLowerCase();
              return acknowledged.some(ack => {
                const pattern = (ack.title_pattern || '').toLowerCase();
                if (!pattern) return false;  // empty pattern matches everything — reject
                const titleMatch = title.toLowerCase().includes(pattern.toLowerCase());
                const fileMatch = !ack.file_pattern || file.includes((ack.file_pattern || '').toLowerCase());
                return titleMatch && fileMatch;
              });
            }

            const allCritHigh = (parsed.findings || []).filter(f => {
              const sev = (f.severity || '').toUpperCase();
              return sev === 'CRITICAL' || sev === 'HIGH';
            });

            const novel = allCritHigh.filter(f => !isAcknowledged(f));
            const suppressed = allCritHigh.filter(f => isAcknowledged(f));

            if (suppressed.length > 0) {
              core.info(`Suppressed ${suppressed.length} acknowledged CRITICAL/HIGH finding(s):`);
              for (const f of suppressed) {
                core.info(`  [ACK] ${f.severity}: ${f.title} (${f.file})`);
              }
            }

            if (novel.length > 0) {
              core.setFailed(`Merge blocked: ${novel.length} NEW CRITICAL/HIGH finding(s) (${suppressed.length} acknowledged, skipped)`);
              for (const f of novel) {
                core.error(`  [NEW] ${f.severity}: ${f.title} (${f.file})`);
              }
            } else {
              core.info(`No new CRITICAL/HIGH findings — review passed (${suppressed.length} acknowledged finding(s) suppressed)`);
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
