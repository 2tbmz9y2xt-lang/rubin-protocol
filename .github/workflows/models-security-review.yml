name: "Orchestrated Multi-Model Security Review (GitHub Models)"

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**/*.go'
      - '**/*.rs'
      - '**/*.lean'

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  get-diff:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.diff.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }})
          if [ -z "$DIFF" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "$DIFF" > /tmp/pr_diff.txt
          fi
        env:
          GH_TOKEN: ${{ github.token }}
    outputs:
      diff-path: /tmp/pr_diff.txt

  security-review:
    needs: get-diff
    if: needs.get-diff.outputs.skip != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model:
          - id: openai/gpt-4.1
            name: gpt-4.1
            fallback: deepseek/DeepSeek-V3-0324
          - id: deepseek/DeepSeek-V3-0324
            name: deepseek-v3
            fallback: meta/Llama-4-Maverick-17B-128E-Instruct-FP8
          - id: meta/Llama-4-Maverick-17B-128E-Instruct-FP8
            name: llama-4-maverick
            fallback: openai/gpt-4.1-mini
    steps:
      - uses: actions/checkout@v4
      - name: Run security review with fallback
        id: review
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('/tmp/pr_diff.txt', 'utf8').slice(0, 12000);

            const systemPrompt = `You are the main protocol security reviewer for the RUBIN protocol.

            Context:
            - Bitcoin-like UTXO chain with dual reference clients (Go + Rust) and Lean4 formal verification
            - Cryptography: ML-DSA-65 (native signature scheme). SLH-DSA is NOT natively used, only referenced externally
            - Covenant-typed covenant system (P2PK, HTLC, anchor, DA-commit)
            - Soft-fork deployment mechanism for protocol upgrades
            - Canonical chain: RUBIN_L1_CANONICAL.md -> fixtures -> Go client -> Rust parity client -> conformance tests

            Review the diff for security issues (ordered by severity):
            CRITICAL: double-spend, inflation, signature bypass, fork-choice errors, reorg safety
            HIGH: nonce reuse, weak entropy, PQ parameter misuse, hash collision paths
            MEDIUM: integer overflow/underflow, slice bounds, unchecked casts, panic paths in consensus
            LOW: state transitions, disconnect/reconnect correctness, undo record integrity
            INFO: behavioral divergence that could cause chain splits
            PERF: unbounded allocations, CPU-intensive paths, disk exhaustion
            STYLE: constant type confusion, vault bypass, timelock circumvention

            Output JSON: {"model":"<name>","findings":[{"severity":"CRITICAL|HIGH|MEDIUM|LOW|INFO|PERF|STYLE","file":"<path>","line":<n>,"title":"<short>","details":"<explanation>","suggestion":"<fix>"}],"summary":"<overall>"}`;

            const models = [
              '${{ matrix.model.id }}',
              '${{ matrix.model.fallback }}'
            ];

            let result = null;
            let usedModel = null;

            for (const modelId of models) {
              try {
                core.info(`Trying model: ${modelId}`);
                const response = await fetch(
                  'https://models.github.ai/inference/chat/completions',
                  {
                    method: 'POST',
                    headers: {
                      'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      model: modelId,
                      messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: `Review this PR diff:\n\n${diff}` }
                      ],
                      temperature: 0.2
                    })
                  }
                );
                if (!response.ok) {
                  core.warning(`Model ${modelId} returned ${response.status}: ${response.statusText}`);
                  continue;
                }
                const data = await response.json();
                result = data.choices[0].message.content;
                usedModel = modelId;
                break;
              } catch (err) {
                core.warning(`Model ${modelId} failed: ${err.message}`);
              }
            }

            if (!result) {
              core.setFailed('All models unavailable');
              return;
            }

            core.info(`Used model: ${usedModel}`);
            core.setOutput('review', result);
            core.setOutput('used_model', usedModel);
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post review comment
        if: steps.review.outputs.review
        uses: actions/github-script@v7
        with:
          script: |
            const review = ${{ toJSON(steps.review.outputs.review) }};
            const model = '${{ steps.review.outputs.used_model }}';
            const label = '${{ matrix.model.name }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Security Review: ${label}\n_Model: ${model}_\n\n\`\`\`json\n${review}\n\`\`\``
            });

  aggregate:
    needs: security-review
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = ${{ toJSON(needs.security-review) }};
            if (jobs.result === 'failure') {
              core.setFailed('One or more security reviews failed after fallback');
            } else {
              core.info('All security reviews completed');
            }
