name: Auto-approve PR

on:
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  status:
  workflow_run:
    workflows: [ci]
    types: [completed]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    if: github.event.pull_request || github.event.check_suite || github.event.sha || github.event.workflow_run
    steps:
      - name: Wait for all checks, approve and merge
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const MAX_ATTEMPTS = 30;
            const POLL_INTERVAL = 30000; // 30 seconds
            const PROTECTED_BASE_BRANCHES = new Set(['main', 'master']);

            async function getOpenPullRequestByNumber(pull_number) {
              const response = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number
              });
              if (response.data.state !== 'open') {
                return null;
              }
              return response.data;
            }

            function isCandidateBranch(branch) {
              return !!branch && !PROTECTED_BASE_BRANCHES.has(branch);
            }

            async function getOpenPullRequestByHead(branch, sha) {
              if (!isCandidateBranch(branch)) {
                return null;
              }
              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${branch}`,
                per_page: 10
              });
              const exact = prs.data.find(pr => pr.head.sha === sha);
              return exact ?? null;
            }

            async function getAssociatedOpenPullRequest(sha) {
              if (!sha) {
                return null;
              }
              const pulls = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: sha
              });
              const exact = pulls.data.filter(pr => pr.state === 'open' && pr.head.sha === sha);
              if (exact.length === 1) {
                return exact[0];
              }
              if (exact.length > 1) {
                console.log(`Ambiguous open PRs for sha ${sha}: ${exact.map(pr => '#' + pr.number).join(', ')}`);
              }
              return null;
            }

            async function resolvePullRequest() {
              if (context.payload.pull_request) {
                return getOpenPullRequestByNumber(context.payload.pull_request.number);
              }

              if (context.payload.workflow_run) {
                const workflowRun = context.payload.workflow_run;
                if (workflowRun.event !== 'pull_request') {
                  console.log(`workflow_run event=${workflowRun.event}; skipping`);
                  return null;
                }
                const fromPayload = workflowRun.pull_requests?.find(pr => pr.state === 'open');
                if (fromPayload) {
                  return getOpenPullRequestByNumber(fromPayload.number);
                }
                return (
                  await getOpenPullRequestByHead(workflowRun.head_branch, workflowRun.head_sha)
                ) ?? (
                  await getAssociatedOpenPullRequest(workflowRun.head_sha)
                );
              }

              if (context.payload.check_suite) {
                const checkSuite = context.payload.check_suite;
                const fromPayload = checkSuite.pull_requests?.find(pr => pr.state === 'open');
                if (fromPayload) {
                  return getOpenPullRequestByNumber(fromPayload.number);
                }
                return (
                  await getOpenPullRequestByHead(checkSuite.head_branch, checkSuite.head_sha)
                ) ?? (
                  await getAssociatedOpenPullRequest(checkSuite.head_sha)
                );
              }

              if (context.payload.sha) {
                return getAssociatedOpenPullRequest(context.payload.sha);
              }

              return null;
            }

            const pr = await resolvePullRequest();
            if (!pr) {
              console.log('No open PR found, skipping');
              return;
            }

            const prNumber = pr.number;
            console.log(`Found PR #${prNumber}`);

            // --- Poll for checks to complete ---
            const ref = pr.head.sha;

            for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
              const checks = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: ref,
                per_page: 100
              });

              const validatorRuns = checks.data.check_runs.filter(c => c.name === 'validator');
              const validator = validatorRuns.sort((a, b) => b.id - a.id)[0];
              const validatorState = validator
                ? `${validator.status}/${validator.conclusion ?? 'none'}`
                : 'missing';

              const pending = checks.data.check_runs.filter(
                c => c.name !== 'auto-approve' && c.status !== 'completed'
              );
              const failed = checks.data.check_runs.filter(
                c => c.name !== 'auto-approve' && c.status === 'completed'
                  && c.conclusion !== 'success' && c.conclusion !== 'skipped'
                  && c.conclusion !== 'neutral'
              );

              if (failed.length > 0) {
                console.log(`${failed.length} checks failed, not approving:`);
                for (const f of failed) {
                  console.log(`  FAILED: ${f.name} - ${f.conclusion}`);
                }
                console.log(`  validator state: ${validatorState}`);
                return;
              }

              if (!validator) {
                if (attempt === MAX_ATTEMPTS || pending.length === 0) {
                  console.log(`Validator check is required but ${validatorState}; not approving/merging.`);
                  return;
                }
                console.log(`Attempt ${attempt}: validator is ${validatorState}, waiting ${POLL_INTERVAL/1000}s...`);
                await new Promise(r => setTimeout(r, POLL_INTERVAL));
                continue;
              }

              if (validator.status === 'completed' && validator.conclusion !== 'success') {
                console.log(`Validator check is ${validatorState}; not approving/merging.`);
                return;
              }

              if (pending.length === 0 && validator.conclusion === 'success') {
                console.log(`All checks passed (attempt ${attempt})`);
                break;
              }

              if (attempt === MAX_ATTEMPTS) {
                console.log(`Timeout: still ${pending.length} checks pending after ${MAX_ATTEMPTS} attempts`);
                for (const p of pending) {
                  console.log(`  PENDING: ${p.name} - ${p.status}`);
                }
                console.log(`  validator state: ${validatorState}`);
                return;
              }

              console.log(`Attempt ${attempt}: ${pending.length} checks pending, validator=${validatorState}, waiting ${POLL_INTERVAL/1000}s...`);
              await new Promise(r => setTimeout(r, POLL_INTERVAL));
            }

            // --- Check existing reviews ---
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const approved = reviews.data.some(
              r => r.user.login === 'github-actions[bot]' && r.state === 'APPROVED'
            );

            if (!approved) {
              console.log(`All checks passed for PR #${prNumber}, approving...`);
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'APPROVE',
                body: 'All CI checks passed. Auto-approved by workflow.'
              });
            } else {
              console.log('Already approved by github-actions[bot]');
            }

            // --- Auto-merge ---
            console.log(`Merging PR #${prNumber}...`);
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash'
              });
              console.log(`PR #${prNumber} merged successfully`);
            } catch (mergeError) {
              console.log(`Merge failed: ${mergeError.message}`);
              return;
            }

            // --- Delete branch ---
            const prData = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const branchName = prData.data.head.ref;
            if (branchName !== 'main' && branchName !== 'master') {
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branchName}`
                });
                console.log(`Branch ${branchName} deleted`);
              } catch (delError) {
                console.log(`Branch deletion failed: ${delError.message}`);
              }
            }
