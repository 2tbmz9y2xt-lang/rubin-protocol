name: Auto-approve PR

on:
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows: [ci]
    types: [completed]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    if: github.event.pull_request || github.event.workflow_run
    steps:
      - name: Wait for all checks, approve and merge
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const MAX_ATTEMPTS = 30;
            const POLL_INTERVAL = 30000; // 30 seconds
            const SUCCESSFUL_CONCLUSIONS = new Set(['success', 'skipped', 'neutral']);

            async function getOpenPullRequestByNumber(pull_number) {
              const response = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number
              });
              if (response.data.state !== 'open') {
                return null;
              }
              return response.data;
            }

            async function getRequiredContexts(baseBranch) {
              try {
                const response = await github.rest.repos.getBranchProtection({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  branch: baseBranch
                });
                return response.data.required_status_checks?.contexts ?? [];
              } catch (e) {
                console.log(`getBranchProtection failed (${e.status}), falling back to all-checks mode`);
                return null;
              }
            }

            function latestCheckRunsByName(checkRuns) {
              const latest = new Map();
              for (const run of checkRuns) {
                const prev = latest.get(run.name);
                if (!prev || run.id > prev.id) {
                  latest.set(run.name, run);
                }
              }
              return latest;
            }

            async function resolvePullRequest() {
              if (context.payload.pull_request) {
                return getOpenPullRequestByNumber(context.payload.pull_request.number);
              }

              if (context.payload.workflow_run) {
                const workflowRun = context.payload.workflow_run;
                if (workflowRun.event !== 'pull_request') {
                  console.log(`workflow_run event=${workflowRun.event}; skipping`);
                  return null;
                }
                const candidates = workflowRun.pull_requests ?? [];
                if (candidates.length === 0) {
                  console.log(`workflow_run for sha ${workflowRun.head_sha} has no PR payload; skipping`);
                  return null;
                }
                const exactMatches = [];
                for (const candidate of candidates) {
                  const pr = await getOpenPullRequestByNumber(candidate.number);
                  if (pr && pr.head.sha === workflowRun.head_sha) {
                    exactMatches.push(pr);
                  }
                }
                if (exactMatches.length === 1) {
                  return exactMatches[0];
                }
                console.log(`workflow_run sha ${workflowRun.head_sha} resolved to ${exactMatches.length} exact open PRs; skipping`);
                return null;
              }

              return null;
            }

            const pr = await resolvePullRequest();
            if (!pr) {
              console.log('No open PR found, skipping');
              return;
            }

            const prNumber = pr.number;
            console.log(`Found PR #${prNumber}`);
            const requiredContexts = await getRequiredContexts(pr.base.ref);
            const useAllChecks = requiredContexts === null;
            if (useAllChecks) {
              console.log('Falling back to all-checks mode (branch protection not readable)');
            } else {
              console.log(`Required contexts for ${pr.base.ref}: ${requiredContexts.join(', ')}`);
            }

            // --- Poll for checks to complete ---
            const ref = pr.head.sha;

            for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
              const checks = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: ref,
                per_page: 100
              });
              const prState = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              const mergeableState = prState.data.mergeable_state ?? 'unknown';
              const latestChecks = latestCheckRunsByName(checks.data.check_runs);
              const contextList = useAllChecks ? [...latestChecks.keys()] : requiredContexts;
              const missingRequired = useAllChecks ? [] : contextList.filter(name => !latestChecks.has(name));
              const pendingRequired = contextList.filter(name => {
                const run = latestChecks.get(name);
                return run && run.status !== 'completed';
              });
              const failedRequired = contextList.filter(name => {
                const run = latestChecks.get(name);
                return run && run.status === 'completed' && !SUCCESSFUL_CONCLUSIONS.has(run.conclusion ?? '');
              });

              if (failedRequired.length > 0) {
                console.log(`${failedRequired.length} required checks failed, not approving:`);
                for (const name of failedRequired) {
                  const run = latestChecks.get(name);
                  console.log(`  FAILED: ${name} - ${run?.conclusion ?? 'unknown'}`);
                }
                return;
              }

              if (mergeableState === 'behind') {
                console.log(`PR #${prNumber} is behind ${pr.base.ref}; not merging until branch is updated.`);
                return;
              }

              if (missingRequired.length === 0 && pendingRequired.length === 0) {
                console.log(`All checks passed (attempt ${attempt})`);
                break;
              }

              if (attempt === MAX_ATTEMPTS) {
                console.log(`Timeout: missing_required=${missingRequired.length}, pending_required=${pendingRequired.length}, mergeable_state=${mergeableState} after ${MAX_ATTEMPTS} attempts`);
                for (const name of missingRequired) {
                  console.log(`  MISSING: ${name}`);
                }
                for (const name of pendingRequired) {
                  const run = latestChecks.get(name);
                  console.log(`  PENDING: ${name} - ${run?.status ?? 'missing'}`);
                }
                return;
              }

              console.log(`Attempt ${attempt}: missing_required=${missingRequired.length}, pending_required=${pendingRequired.length}, mergeable_state=${mergeableState}, waiting ${POLL_INTERVAL/1000}s...`);
              await new Promise(r => setTimeout(r, POLL_INTERVAL));
            }

            // --- Check existing reviews ---
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const approved = reviews.data.some(
              r => r.user.login === 'github-actions[bot]' && r.state === 'APPROVED'
            );

            if (!approved) {
              console.log(`All checks passed for PR #${prNumber}, approving...`);
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'APPROVE',
                body: 'All CI checks passed. Auto-approved by workflow.'
              });
            } else {
              console.log('Already approved by github-actions[bot]');
            }

            // --- Auto-merge ---
            console.log(`Merging PR #${prNumber}...`);
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash'
              });
              console.log(`PR #${prNumber} merged successfully`);
            } catch (mergeError) {
              console.log(`Merge failed: ${mergeError.message}`);
              return;
            }

            // --- Delete branch ---
            const prData = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const branchName = prData.data.head.ref;
            if (branchName !== 'main' && branchName !== 'master') {
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branchName}`
                });
                console.log(`Branch ${branchName} deleted`);
              } catch (delError) {
                console.log(`Branch deletion failed: ${delError.message}`);
              }
            }
