name: Go↔Rust Parity Gate

on:
  pull_request:
    paths:
      - 'clients/go/**'
      - 'clients/rust/**'
      - 'conformance/fixtures/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  parity-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed paths
        id: diff
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "$CHANGED" > /tmp/changed.txt

          GO_CHANGED=$(grep -c '^clients/go/'   /tmp/changed.txt || true)
          RS_CHANGED=$(grep -c '^clients/rust/' /tmp/changed.txt || true)
          ENC_CHANGED=$(grep -E '^clients/(go|rust)/.*(encode|decode|serial|wire|txid|wtxid|hash)' /tmp/changed.txt | wc -l || true)
          FIX_CHANGED=$(grep -c '^conformance/fixtures/' /tmp/changed.txt || true)

          echo "go=$GO_CHANGED"   >> "$GITHUB_OUTPUT"
          echo "rs=$RS_CHANGED"   >> "$GITHUB_OUTPUT"
          echo "enc=$ENC_CHANGED" >> "$GITHUB_OUTPUT"
          echo "fix=$FIX_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Check parity-exempt label
        id: label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            core.setOutput('exempt',  labels.includes('parity-exempt'));
            core.setOutput('fixture', labels.includes('fixture-exempt'));

      - name: Enforce Go↔Rust parity
        if: steps.label.outputs.exempt != 'true'
        run: |
          GO=${{ steps.diff.outputs.go }}
          RS=${{ steps.diff.outputs.rs }}
          if [ "$GO" -gt 0 ] && [ "$RS" -eq 0 ]; then
            echo "::error::Go client changed but Rust client did not. Add a matching change or label PR with 'parity-exempt' and justify in the description."
            exit 1
          fi
          if [ "$RS" -gt 0 ] && [ "$GO" -eq 0 ]; then
            echo "::error::Rust client changed but Go client did not. Add a matching change or label PR with 'parity-exempt' and justify in the description."
            exit 1
          fi

      - name: Enforce conformance fixture update on encoding changes
        if: steps.label.outputs.fixture != 'true'
        run: |
          ENC=${{ steps.diff.outputs.enc }}
          FIX=${{ steps.diff.outputs.fix }}
          if [ "$ENC" -gt 0 ] && [ "$FIX" -eq 0 ]; then
            echo "::error::Encoding/hash code changed but no conformance/fixtures/** updates. Update vectors or label 'fixture-exempt' with justification."
            exit 1
          fi
