# ──────────────────────────────────────────────────────────
# Codacy configuration for Rubin Protocol
# ──────────────────────────────────────────────────────────
# Duplication thresholds:
#   clients/go/   — target < 5% (security-critical, duplication preferred over abstraction)
#   clients/rust/ — target < 5% (same rationale)
#   Cross-client Go↔Rust duplication is architectural (dual-client) and ignored.
#   conformance/, rubin-formal/, tools/, scripts/, analysis/ — excluded entirely.
# ──────────────────────────────────────────────────────────
---

exclude_paths:
  # Tests are intentionally repetitive and should not gate merges on clone detection.
  - "clients/go/**/*_test.go"
  - "clients/rust/**/tests/**"
  - "clients/rust/**/benches/**"
  # Entrypoint binaries are integration-tested; exclude from diff coverage.
  - "clients/go/cmd/**"
  - "clients/rust/crates/rubin-node/src/**"
  - "clients/rust/crates/rubin-consensus-cli/src/**"
  # Non-executable artifacts (fixtures, matrices, formal Lean pack) are not part of Go/Rust
  # code coverage and must not dilute diff-coverage gates.
  - ".github/**"
  - "conformance/**"
  - "rubin-formal/**"
  - "tools/**"
  # Normative specs (Markdown documents, not code).
  - "spec/**"
  # Shell/JS utility scripts and spec analysis tooling.
  - "scripts/**"
  - "analysis/**"
  # Generated files — deterministic output, not human-authored.
  - "**/*.gen.go"
  - "**/*_generated.rs"
  # Dependency lockfiles.
  - "package-lock.json"
  # IBD parallel validation: consensus-critical code with mandatory high branching
  # (one-to-one parity with sequential validation path). Complexity is reviewed via
  # security-review AI, CodeQL, and conformance test coverage instead.
  - "clients/go/consensus/connect_block_parallel.go"
  - "clients/go/consensus/sig_verify_batch.go"
  - "clients/go/consensus/sig_verify_queued.go"
  # Mempool admission precheck (RUB-166 cheap fee-floor fast-reject,
  # PR #1422). SCOPE-CAVEAT: the per-file exclusion below disables ALL
  # Codacy analyses (complexity, code-style, duplication, coverage)
  # for these four files — not just the specific complexity warning
  # that motivated it. Accepted because:
  #   1. Each file is consensus-critical class-closure code that
  #      mirrors every terminal-reject branch in the slow path
  #      (clients/go/consensus/utxo_basic.go and covenant_genesis.go
  #      and spend_verify.go); branching is mandatory.
  #   2. The branch density CANNOT be lowered without re-introducing
  #      class-leak gaps (waves 4..16 of PR #1422 added each guard
  #      after Copilot/Codex flagged the missing class).
  #   3. Coverage is enforced by the comprehensive `rub166_*` (Rust)
  #      and `TestMempoolCheap*` (Go) test suites that exercise each
  #      defer branch — counts are intentionally not pinned here so
  #      this comment does not drift on every test addition; current
  #      counts are `cargo test -p rubin-node --lib rub166_ -- --list`
  #      and `go test -count=1 -v ./node -run TestMempoolCheap | grep -c "^=== RUN"`.
  #   4. Future changes to these files SHOULD be reviewed against the
  #      class-leak / TOCTOU / panic-safety / per-branch-test-enumeration
  #      lenses (see review-thread chains on PR #1422 waves 4..16 for
  #      worked examples) so the Codacy exclusion does not silently
  #      relax review quality.
  # Keep these as top-level exclusions until this accepted-risk class is
  # revisited: they intentionally suppress all Codacy analyses for the
  # listed files. For new complexity-only accepted-risk files, prefer
  # engines.metric.exclude_paths below so other non-excluded analyses can
  # still run.
  - "clients/go/node/mempool_precheck.go"
  - "clients/go/node/mempool_precheck_floor.go"
  - "clients/go/node/mempool_precheck_input.go"
  - "clients/go/node/mempool_precheck_output.go"

engines:
  metric:
    exclude_paths:
      # Aggregate complexity accepted-risk exclusions (2026-05-19).
      # Codacy currently gates aggregate complexity even when there are no issue rows.
      # Keep this list narrow and explicit: these files are branch-dense protocol,
      # consensus, crypto, or node lifecycle surfaces where mechanical simplification
      # is more likely to change validation order, public errors, or runtime state
      # than to improve production safety. This metric block must not broaden
      # top-level exclusions; other analyses remain controlled by their own
      # existing engine-specific settings.
      #
      # Go node runtime branch closures; exact current files, no future-file wildcard.
      - "clients/go/node/blockstore.go"
      - "clients/go/node/blockstore_p2p.go"
      - "clients/go/node/chainstate.go"
      - "clients/go/node/chainstate_io.go"
      - "clients/go/node/chainstate_recovery.go"
      - "clients/go/node/config.go"
      - "clients/go/node/mempool.go"
      - "clients/go/node/mempool_capacity.go"
      - "clients/go/node/mempool_policy.go"
      - "clients/go/node/miner.go"
      - "clients/go/node/p2p/addr_manager.go"
      - "clients/go/node/p2p/compact_reconstruct.go"
      - "clients/go/node/p2p/compact_wire.go"
      # DA relay staged/orphan accounting is branch-dense P2P state-machine code;
      # keep this metric-only exclusion narrow while targeted DA tests and review
      # cover validation-before-mutation, accounting, and quota invariants.
      - "clients/go/node/p2p/da_relay_state.go"
      - "clients/go/node/p2p/handlers_block.go"
      - "clients/go/node/p2p/handshake.go"
      - "clients/go/node/p2p/mempool.go"
      - "clients/go/node/p2p/orphan_pool.go"
      - "clients/go/node/p2p/peer_runtime.go"
      - "clients/go/node/p2p/reconnect.go"
      - "clients/go/node/p2p/service.go"
      - "clients/go/node/p2p/service_listener.go"
      - "clients/go/node/p2p/wire.go"
      - "clients/go/node/policy_da_anchor.go"
      - "clients/go/node/production_rotation_schedule.go"
      - "clients/go/node/sync.go"
      - "clients/go/node/sync_mempool.go"
      - "clients/go/node/sync_reorg.go"
      - "clients/go/node/undo.go"
      # Consensus parser / UTXO / CORE_EXT / block-policy branch closures.
      - "clients/go/consensus/block_basic.go"
      - "clients/go/consensus/block_basic_weight.go"
      - "clients/go/consensus/core_ext.go"
      - "clients/go/consensus/live_binding_policy.go"
      - "clients/go/consensus/tx_parse.go"
      - "clients/go/consensus/tx_validate_worker.go"
      - "clients/go/consensus/utxo_basic.go"
      # RUB-598: decomposing evaluateJet/evaluateIntrinsics into small per-method-CCN<=8 helpers
      # (jetPreflight/jetRegistryAllows, evaluateOneIntrinsic/intrinsicAccepted) raised the aggregate
      # per-file complexity sum, since each extracted function adds its own baseline CCN — the local
      # lizard per-method gate is green, this is the aggregate-only metric penalizing decomposition
      # itself, matching the accepted-risk rationale above.
      - "clients/go/consensus/simplicity/program.go"
      - "clients/go/consensus/simplicity/context_host.go"
      - "clients/rust/crates/rubin-consensus/src/block_basic/da_set.rs"
      - "clients/rust/crates/rubin-consensus/src/block_basic/weight.rs"
      - "clients/rust/crates/rubin-consensus/src/core_ext.rs"
      - "clients/rust/crates/rubin-consensus/src/da_verify_parallel.rs"
      - "clients/rust/crates/rubin-consensus/src/live_binding_policy.rs"
      - "clients/rust/crates/rubin-consensus/src/sig_queue.rs"
      - "clients/rust/crates/rubin-consensus/src/suite_registry.rs"
      - "clients/rust/crates/rubin-consensus/src/tx.rs"
      - "clients/rust/crates/rubin-consensus/src/utxo_basic.rs"
      # OpenSSL binding code is intentionally explicit and branch-heavy.
      - "clients/go/consensus/openssl_signer.go"
      - "clients/go/consensus/verify_sig_openssl.go"
  duplication:
    # CLI dispatchers, fixture generators, and node integration code contain
    # inherent structural repetition (dispatch boilerplate, tx-building
    # templates, IBD vs sequential paths) that cannot be eliminated safely.
    # Codacy's documented duplication knob is token-based (`minTokenMatch`),
    # not line-based; keep the threshold aligned with the local `.jscpd.json`
    # informational PR check (`minTokens: 100`).
    exclude_paths:
      - "clients/go/cmd/**"
      - "clients/rust/crates/rubin-consensus-cli/**"
      - "clients/go/node/**"
    minTokenMatch: 100

languages:
  # Product code lives in Go/Rust. Everything below is docs/tooling/fixtures or
  # workflow metadata already excluded above, so running language analyzers only
  # adds noise on PRs that do not touch executable code.
  javascript:
    enabled: false
  typescript:
    enabled: false
  python:
    enabled: false
  json:
    enabled: false
  yaml:
    enabled: false
  markdown:
    enabled: false
