# ──────────────────────────────────────────────────────────
# Codacy configuration for Rubin Protocol
# ──────────────────────────────────────────────────────────
# Duplication thresholds:
#   clients/go/   — target < 5% (security-critical, duplication preferred over abstraction)
#   clients/rust/ — target < 5% (same rationale)
#   Cross-client Go↔Rust duplication is architectural (dual-client) and ignored.
#   conformance/, rubin-formal/, tools/, scripts/, analysis/ — excluded entirely.
# ──────────────────────────────────────────────────────────
---

exclude_paths:
  # Tests are intentionally repetitive and should not gate merges on clone detection.
  - "clients/go/**/*_test.go"
  - "clients/rust/**/tests/**"
  - "clients/rust/**/benches/**"
  # Entrypoint binaries are integration-tested; exclude from diff coverage.
  - "clients/go/cmd/**"
  - "clients/rust/crates/rubin-node/src/**"
  - "clients/rust/crates/rubin-consensus-cli/src/**"
  # Non-executable artifacts (fixtures, matrices, formal Lean pack) are not part of Go/Rust
  # code coverage and must not dilute diff-coverage gates.
  - ".github/**"
  - "conformance/**"
  - "rubin-formal/**"
  - "tools/**"
  # Normative specs (Markdown documents, not code).
  - "spec/**"
  # Shell/JS utility scripts and spec analysis tooling.
  - "scripts/**"
  - "analysis/**"
  # Generated files — deterministic output, not human-authored.
  - "**/*.gen.go"
  - "**/*_generated.rs"
  # Dependency lockfiles.
  - "package-lock.json"
  # IBD parallel validation: consensus-critical code with mandatory high branching
  # (one-to-one parity with sequential validation path). Complexity is reviewed via
  # security-review AI, CodeQL, and conformance test coverage instead.
  - "clients/go/consensus/connect_block_parallel.go"
  - "clients/go/consensus/sig_verify_batch.go"
  - "clients/go/consensus/sig_verify_queued.go"
  # Mempool admission precheck (RUB-166 cheap fee-floor fast-reject):
  # consensus-critical class-closure code that mirrors every terminal-reject
  # branch in the slow path so below-floor + structurally-defective tx are not
  # misclassified as transient Unavailable. Each guard maps 1:1 to a slow-path
  # check at clients/go/consensus/utxo_basic.go and covenant_genesis.go;
  # branching is mandatory. Reviewed via class-leak-auditor + toctou-auditor +
  # 18 rub166_*/TestMempoolCheap* tests covering each defer branch.
  - "clients/go/node/mempool_precheck.go"
  - "clients/go/node/mempool_precheck_floor.go"
  - "clients/go/node/mempool_precheck_input.go"
  - "clients/go/node/mempool_precheck_output.go"

engines:
  duplication:
    # CLI dispatchers, fixture generators, and node integration code contain
    # inherent structural repetition (dispatch boilerplate, tx-building
    # templates, IBD vs sequential paths) that cannot be eliminated without
    # sacrificing readability.  Raise the minimum clone threshold so only
    # substantive duplications (>35 lines) are reported.
    exclude_paths:
      - "clients/go/cmd/**"
      - "clients/rust/crates/rubin-consensus-cli/**"
      - "clients/go/node/**"
    config:
      minLines: 35

languages:
  # Product code lives in Go/Rust. Everything below is docs/tooling/fixtures or
  # workflow metadata already excluded above, so running language analyzers only
  # adds noise on PRs that do not touch executable code.
  javascript:
    enabled: false
  typescript:
    enabled: false
  python:
    enabled: false
  json:
    enabled: false
  yaml:
    enabled: false
  markdown:
    enabled: false
